<!doctype html>
<html lang="nl" data-theme="dark" data-phos="amber" data-crt="on">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, viewport-fit=cover" />
<meta name="color-scheme" content="dark" />
<meta name="theme-color" content="#0b0a08" />
<title>P2000 — DISPATCH</title>

<link rel="preconnect" href="https://unpkg.com" crossorigin />
<link rel="preconnect" href="https://a.basemaps.cartocdn.com" crossorigin />
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" crossorigin="" />

<style>
/* ============================== Design tokens ============================== */
:root{
  --mono: ui-monospace, SFMono-Regular, "Cascadia Code", Menlo, Consolas, "Roboto Mono", monospace;

  --bg:#0b0a08;
  --bg-2:#100e0a;
  --panel:#0e0c09;

  /* discipline color-coding (reads on the amber board) */
  --disc-ambulance:#3ce084;   /* phosphor green */
  --disc-brandweer:#ff9d3a;   /* amber/orange   */
  --disc-politie:#5aa2ff;     /* blue           */
  --disc-knrm:#3fe0e0;        /* cyan           */
  --disc-other:#8b8172;       /* dim gray       */

  --pr1:#ff5b5b;              /* urgent / A1 P1 */
  --pr2:#ffcf5a;
  --pr3:#3fd0e0;

  /* phosphor foreground (swapped by [data-phos]) */
  --fg:#ffb000;
  --fg-bright:#ffd27a;
  --fg-dim:#8a6a1f;
  --fg-faint:#5a4715;
  --line:#3a2f14;
  --line-2:#241d0c;
  --glow: 0 0 6px rgba(255,176,0,.35);
  --glow-strong: 0 0 12px rgba(255,176,0,.5);
  --glow-rgb:255,176,0;

  --cols: 58px 52px 58px minmax(96px,150px) minmax(120px,190px) minmax(0,1fr);
}
:root[data-phos="green"]{
  --fg:#33ff77;
  --fg-bright:#a6ffc4;
  --fg-dim:#2f8a4a;
  --fg-faint:#1c5a30;
  --line:#194a2a;
  --line-2:#0f2f1b;
  --glow: 0 0 6px rgba(51,255,119,.32);
  --glow-strong: 0 0 12px rgba(51,255,119,.5);
  --glow-rgb:51,255,119;
  --disc-brandweer:#ffa94d;
}

*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0; font-family:var(--mono); color:var(--fg);
  background:var(--bg);
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  overflow:hidden; overscroll-behavior:none;
  font-size:14px; letter-spacing:.01em;
}
button,input{font-family:inherit; color:inherit}
button{cursor:pointer; background:none; border:0}
::selection{background:rgba(var(--glow-rgb),.28); color:var(--fg-bright)}

/* thin amber scrollbars */
*{scrollbar-width:thin; scrollbar-color:var(--line) transparent}
*::-webkit-scrollbar{width:9px; height:9px}
*::-webkit-scrollbar-thumb{background:var(--line); border-radius:0}
*::-webkit-scrollbar-thumb:hover{background:var(--fg-dim)}
*::-webkit-scrollbar-track{background:transparent}

/* ============================== CRT texture ============================== */
.crt{position:fixed; inset:0; z-index:9000; pointer-events:none}
.crt::before{ /* scanlines */
  content:""; position:absolute; inset:0;
  background:repeating-linear-gradient(0deg,
    rgba(0,0,0,.22) 0px, rgba(0,0,0,.22) 1px,
    transparent 1px, transparent 3px);
  opacity:.55; mix-blend-mode:multiply;
}
.crt::after{ /* vignette + faint phosphor bloom */
  content:""; position:absolute; inset:0;
  background:
    radial-gradient(140% 110% at 50% 0%, rgba(var(--glow-rgb),.05), transparent 55%),
    radial-gradient(120% 120% at 50% 50%, transparent 62%, rgba(0,0,0,.55) 100%);
}
html[data-crt="off"] .crt{display:none}

/* ============================== Layout shell ============================== */
.app{display:flex; flex-direction:column; height:100%; height:100dvh; position:relative; z-index:1}

/* ---- Status line (header) ---- */
.statusbar{
  flex:0 0 auto; display:flex; align-items:center; gap:14px; flex-wrap:wrap;
  padding:9px max(12px, env(safe-area-inset-left));
  padding-top:max(9px, env(safe-area-inset-top));
  border-bottom:1px solid var(--line);
  background:linear-gradient(180deg, var(--bg-2), var(--bg));
  text-shadow:var(--glow);
}
.wordmark{font-size:18px; font-weight:700; letter-spacing:.22em; color:var(--fg); text-shadow:var(--glow-strong)}
.divider{color:var(--fg-faint); letter-spacing:.1em; font-size:14px; user-select:none}
.live-label{font-size:11px; letter-spacing:.28em; color:var(--fg-dim)}
.clock{font-size:13px; color:var(--fg-bright); letter-spacing:.12em; font-variant-numeric:tabular-nums}
.sb-spacer{flex:1 1 auto; min-width:6px}

.sb-stat{font-size:11px; letter-spacing:.14em; color:var(--fg-dim); white-space:nowrap}
.sb-stat b{color:var(--fg); font-weight:700; font-variant-numeric:tabular-nums; margin-left:5px; text-shadow:var(--glow)}

/* connection LED */
.conn{display:inline-flex; align-items:center; gap:7px; font-size:11px; letter-spacing:.16em; color:var(--fg-dim); white-space:nowrap}
.conn .dot{width:8px; height:8px; border-radius:50%; background:var(--disc-other); flex:0 0 auto}
.conn.live{color:var(--disc-ambulance)}
.conn.live .dot{background:var(--disc-ambulance); box-shadow:0 0 8px var(--disc-ambulance)}
.conn.reconnecting{color:var(--pr2)}
.conn.reconnecting .dot{background:var(--pr2); box-shadow:0 0 8px var(--pr2); animation:blink 1s steps(2,end) infinite}
.conn.down{color:var(--pr1)}
.conn.down .dot{background:var(--pr1); box-shadow:0 0 8px var(--pr1)}
@keyframes blink{50%{opacity:.2}}

/* terminal bracket buttons */
.tbtn{
  font-family:var(--mono); font-size:12px; letter-spacing:.08em; text-transform:uppercase;
  color:var(--fg-dim); padding:4px 6px; white-space:nowrap; line-height:1.1;
  border:1px solid transparent; transition:color .12s, background .12s, border-color .12s, box-shadow .12s;
}
.tbtn:hover{color:var(--fg)}
.tbtn:focus-visible{outline:1px dashed var(--fg-dim); outline-offset:1px}
.tbtn.on{color:var(--fg); text-shadow:var(--glow)}
.tbtn.solid.on{background:var(--fg); color:var(--bg); text-shadow:none; box-shadow:var(--glow-strong)}
.tbtn .cnt{opacity:.7; margin-left:3px}
.tbtn[hidden]{display:none}

.sb-tools{display:flex; align-items:center; gap:2px}

/* ---- Controls bar ---- */
.controls{
  flex:0 0 auto; display:flex; align-items:center; gap:4px 6px; flex-wrap:wrap;
  padding:7px max(12px, env(safe-area-inset-left));
  border-bottom:1px solid var(--line);
  background:var(--bg-2);
}
.ctl-group{display:flex; align-items:center; gap:2px; flex-wrap:wrap}
.ctl-sep{width:1px; align-self:stretch; background:var(--line); margin:2px 6px}

/* discipline tags */
.dtag-btn{
  font-family:var(--mono); font-size:12px; letter-spacing:.05em; padding:4px 7px; white-space:nowrap;
  color:var(--c,var(--fg-dim)); border:1px solid transparent; transition:.12s; line-height:1.1;
}
.dtag-btn:hover{border-color:color-mix(in srgb, var(--c) 40%, transparent)}
.dtag-btn[aria-pressed="true"]{ text-shadow:0 0 8px color-mix(in srgb, var(--c) 60%, transparent); border-color:color-mix(in srgb, var(--c) 55%, transparent) }
.dtag-btn[aria-pressed="false"]{ color:var(--fg-faint); opacity:.7 }
.dtag-btn .dcnt{opacity:.65; margin-left:3px}

.tbtn.urgent.on{color:var(--pr1); text-shadow:0 0 8px rgba(255,91,91,.55); border-color:color-mix(in srgb,var(--pr1) 45%,transparent)}
.tbtn.tests.on{color:var(--pr2); text-shadow:0 0 8px rgba(255,207,90,.5); border-color:color-mix(in srgb,var(--pr2) 45%,transparent)}
.tbtn.reset{margin-left:auto; color:var(--fg-faint)}
.tbtn.reset:hover{color:var(--pr1)}

/* ============================== Main region ============================== */
.main{position:relative; flex:1 1 auto; min-height:0; display:flex}
.view{display:none; position:absolute; inset:0}
.view.active{display:flex; flex-direction:column}

/* ---- BOARD ---- */
.board{display:flex; flex-direction:column; height:100%; min-height:0}
.board-head{
  flex:0 0 auto; display:grid; grid-template-columns:var(--cols); align-items:center;
  gap:0 12px; padding:8px max(12px, env(safe-area-inset-left)) 8px calc(max(12px, env(safe-area-inset-left)) + 6px);
  border-bottom:1px solid var(--fg-faint);
  font-size:10px; letter-spacing:.2em; color:var(--fg-dim); text-transform:uppercase;
  background:var(--bg-2);
}
.board-head .hcount{color:var(--fg-dim); letter-spacing:.14em}
.board-head .hcount b{color:var(--fg); font-variant-numeric:tabular-nums}

.board-body{flex:1 1 auto; min-height:0; overflow-y:auto; overflow-x:hidden; scroll-behavior:smooth}

/* board row */
.row{position:relative; border-bottom:1px solid var(--line-2)}
.row::before{content:""; position:absolute; left:0; top:0; bottom:0; width:2px; background:var(--c,var(--disc-other)); opacity:.75}
.row-line{
  display:grid; grid-template-columns:var(--cols); align-items:center; gap:0 12px;
  padding:6px max(12px, env(safe-area-inset-left)) 6px calc(max(12px, env(safe-area-inset-left)) + 6px);
  cursor:pointer; outline:none; min-height:32px;
  transition:background .12s;
}
.row-line:hover{background:rgba(var(--glow-rgb),.05)}
.row-line:focus-visible{background:rgba(var(--glow-rgb),.07); box-shadow:inset 0 0 0 1px var(--fg-dim)}
.row.expanded .row-line{background:rgba(var(--glow-rgb),.06)}
.row.sel{box-shadow:inset 0 0 0 1px color-mix(in srgb,var(--fg) 40%,transparent)}

.cell{font-size:12.5px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.c-tijd{color:var(--fg-bright); font-variant-numeric:tabular-nums; letter-spacing:.04em}
.c-disc{color:var(--c,var(--disc-other)); font-size:11px; letter-spacing:.06em; font-weight:700}
.c-plaats{color:var(--fg); font-weight:600}
.c-plaats.nocity{color:var(--fg-faint); font-weight:400}
.c-regio{color:var(--fg-dim)}
.c-msg{color:var(--fg-bright); min-width:0}
.c-msg .tt{color:var(--pr2); font-size:10px; letter-spacing:.1em; margin-left:6px; border:1px solid color-mix(in srgb,var(--pr2) 40%,transparent); padding:0 4px}

/* PRIO badge */
.prio{
  display:inline-block; font-size:11px; font-weight:700; letter-spacing:.03em;
  padding:1px 5px; border:1px solid var(--fg-faint); color:var(--fg-dim); line-height:1.35;
  min-width:30px; text-align:center;
}
.prio.p1{color:var(--pr1); border-color:var(--pr1); text-shadow:0 0 7px rgba(255,91,91,.7); box-shadow:0 0 9px rgba(255,91,91,.28)}
.prio.p2{color:var(--pr2); border-color:color-mix(in srgb,var(--pr2) 60%,transparent); text-shadow:0 0 6px rgba(255,207,90,.4)}
.prio.p3{color:var(--pr3); border-color:color-mix(in srgb,var(--pr3) 55%,transparent)}
.prio.pm{color:var(--fg-dim); border-color:var(--line)}

/* row enter animation (scan sweep, no scroll jump) */
.row.enter{animation:rowIn .5s cubic-bezier(.22,.61,.36,1)}
@keyframes rowIn{from{opacity:0; transform:translateY(-6px)} to{opacity:1; transform:none}}
.row.flash::after{
  content:""; position:absolute; inset:0; pointer-events:none;
  background:linear-gradient(90deg, rgba(var(--glow-rgb),.22), transparent 55%);
  animation:scanfade 1.6s cubic-bezier(.22,.61,.36,1) forwards;
}
@keyframes scanfade{0%{opacity:1; transform:translateX(-8%)} 100%{opacity:0; transform:translateX(0)}}

/* expanded detail */
.row-detail{
  display:none; padding:2px max(12px, env(safe-area-inset-left)) 14px calc(max(12px, env(safe-area-inset-left)) + 18px);
  border-top:1px dashed var(--line); background:rgba(0,0,0,.25);
}
.row.expanded .row-detail{display:block; animation:rowIn .22s ease}
.d-body{font-size:13px; color:var(--fg-bright); line-height:1.55; margin:10px 0; white-space:pre-wrap; word-break:break-word}
.d-row{display:flex; gap:10px; font-size:12px; padding:2px 0; line-height:1.5}
.d-k{color:var(--fg-dim); min-width:104px; flex:0 0 auto; letter-spacing:.08em}
.d-k::before{content:"› "; color:var(--fg-faint)}
.d-v{color:var(--fg); word-break:break-word}
.d-raw{
  margin-top:10px; font-size:11px; line-height:1.55; color:var(--fg-dim);
  border:1px solid var(--line); padding:8px 10px; white-space:pre-wrap; word-break:break-word;
  max-height:170px; overflow:auto; background:rgba(0,0,0,.3);
}
.d-actions{margin-top:12px}

/* empty / awaiting */
.list-empty{display:none; padding:48px 20px; text-align:center; color:var(--fg-dim); font-size:12px; letter-spacing:.14em; line-height:2}
.list-empty.show{display:block}
.list-empty .blink{color:var(--fg); animation:blink 1.1s steps(2,end) infinite}

/* skeleton scanning rows */
.skrow{height:33px; border-bottom:1px solid var(--line-2); position:relative; overflow:hidden}
.skrow::after{content:""; position:absolute; inset:0;
  background:linear-gradient(90deg, transparent, rgba(var(--glow-rgb),.08), transparent);
  transform:translateX(-100%); animation:shimmer 1.6s infinite}
@keyframes shimmer{100%{transform:translateX(100%)}}

/* ---- MAP ---- */
.mapwrap{position:absolute; inset:0}
#map{position:absolute; inset:0; background:var(--bg); z-index:1}
.leaflet-container{background:var(--bg); font-family:var(--mono)}

.livepill{
  position:absolute; z-index:700; left:50%; top:14px; transform:translate(-50%,-16px);
  display:flex; align-items:center; gap:9px; padding:7px 13px;
  background:var(--panel); border:1px solid var(--fg-dim);
  box-shadow:0 0 0 1px rgba(0,0,0,.5), var(--glow);
  font-size:12px; letter-spacing:.06em; color:var(--fg); text-shadow:var(--glow);
  opacity:0; pointer-events:none; transition:.28s cubic-bezier(.22,.61,.36,1);
}
.livepill.show{opacity:1; transform:translate(-50%,0); pointer-events:auto; cursor:pointer}
.livepill .swatch{width:8px; height:8px; border-radius:50%; background:var(--c); box-shadow:0 0 8px var(--c)}

/* leaflet marker */
.mk{position:relative; width:0; height:0}
.mk .glyph{
  position:absolute; left:50%; top:50%; width:20px; height:20px; transform:translate(-50%,-50%);
  border-radius:50%; background:var(--c); border:2px solid rgba(11,10,8,.9);
  box-shadow:0 0 0 1px color-mix(in srgb,var(--c) 60%,transparent), 0 0 10px color-mix(in srgb,var(--c) 55%,transparent);
  display:grid; place-items:center; transition:transform .15s;
}
.mk .glyph svg{width:11px; height:11px; color:#0b0a08}
.mk.sel .glyph{width:26px; height:26px; box-shadow:0 0 0 3px color-mix(in srgb,var(--c) 55%,transparent), 0 0 16px var(--c)}
.mk.new .pulse{position:absolute; left:50%; top:50%; width:20px; height:20px; transform:translate(-50%,-50%);
  border-radius:50%; background:var(--c); animation:mkpulse 1.6s cubic-bezier(.22,.61,.36,1) 3}
@keyframes mkpulse{0%{transform:translate(-50%,-50%) scale(1);opacity:.6}100%{transform:translate(-50%,-50%) scale(3.6);opacity:0}}

.marker-cluster{background:transparent!important}
.mcl{width:36px; height:36px; border-radius:50%; display:grid; place-items:center;
  font-family:var(--mono); font-weight:700; font-size:13px; color:#0b0a08;
  background:var(--disc-politie); border:2px solid rgba(11,10,8,.7);
  box-shadow:0 0 0 5px color-mix(in srgb, var(--disc-politie) 22%, transparent), 0 0 14px color-mix(in srgb,var(--disc-politie) 45%,transparent);
  font-variant-numeric:tabular-nums}
.mcl.big{width:44px; height:44px; font-size:14px}

/* leaflet popup — terminal */
.leaflet-popup-content-wrapper{background:var(--panel); color:var(--fg); border-radius:0;
  box-shadow:0 0 0 1px var(--fg-dim), 0 0 22px rgba(0,0,0,.7); border:1px solid var(--fg-dim); padding:0}
.leaflet-popup-content{margin:0; width:266px!important; line-height:inherit; font-family:var(--mono)}
.leaflet-popup-tip{background:var(--panel); border:1px solid var(--fg-dim); box-shadow:none}
.leaflet-popup-close-button{color:var(--fg-dim)!important; padding:8px 8px 0 0!important; font-size:18px!important}
.leaflet-popup-close-button:hover{color:var(--fg)!important}
.pop{padding:12px 13px 13px}
.pop .ptop{display:flex; align-items:center; gap:8px; margin-bottom:7px}
.pop .pcity{font-size:13px; font-weight:700; color:var(--fg-bright); letter-spacing:.03em}
.pop-sub{font-size:11px; color:var(--fg-dim); margin-bottom:8px; display:flex; gap:6px; flex-wrap:wrap; align-items:center}
.pop-sub .rg{color:var(--fg)}
.pop-sub .sep{color:var(--fg-faint)}
.pop .pbody{font-size:12px; line-height:1.5; color:var(--fg-bright); margin-bottom:8px; white-space:pre-wrap; word-break:break-word}
.pop .pcaps{font-size:10.5px; color:var(--fg-dim); word-break:break-word}
.pop .pfoot{display:flex; justify-content:space-between; align-items:center; margin-top:9px; padding-top:8px; border-top:1px solid var(--line)}
.pop .pfoot .pd{font-size:10.5px; font-weight:700; letter-spacing:.1em; color:var(--c); text-transform:uppercase}
.pop .pfoot .pt{font-size:11px; color:var(--fg-dim); font-variant-numeric:tabular-nums}

.leaflet-control-zoom{border:none!important; box-shadow:none!important; margin:14px!important}
.leaflet-control-zoom a{background:var(--panel)!important; color:var(--fg-dim)!important;
  border:1px solid var(--fg-dim)!important; width:32px!important; height:32px!important; line-height:30px!important;
  font-size:17px!important; border-radius:0; font-family:var(--mono)}
.leaflet-control-zoom a:last-child{border-top:none!important}
.leaflet-control-zoom a:hover{background:var(--bg-2)!important; color:var(--fg)!important}
.leaflet-control-attribution{background:rgba(11,10,8,.85)!important; color:var(--fg-faint)!important;
  border:1px solid var(--line)!important; border-right:none; border-bottom:none;
  font-size:10px!important; padding:2px 7px!important; font-family:var(--mono)}
.leaflet-control-attribution a{color:var(--fg-dim)!important}

/* ============================== Area popover ============================== */
.areapop-backdrop{position:fixed; inset:0; z-index:1999; display:none}
.areapop-backdrop.show{display:block}
.areapop{
  position:fixed; z-index:2000; width:320px; max-width:calc(100vw - 24px);
  background:var(--panel); border:1px solid var(--fg-dim);
  box-shadow:0 0 0 1px rgba(0,0,0,.6), 0 0 30px rgba(0,0,0,.7);
  display:flex; flex-direction:column; overflow:hidden;
  opacity:0; pointer-events:none; transition:opacity .16s ease;
}
.areapop.show{opacity:1; pointer-events:auto}
.areapop .search{padding:10px 11px; border-bottom:1px solid var(--line); position:relative}
.areapop .search input{
  width:100%; padding:8px 10px 8px 24px; border:1px solid var(--line);
  background:var(--bg); color:var(--fg); font-family:inherit; font-size:13px; outline:none; letter-spacing:.03em;
}
.areapop .search input::placeholder{color:var(--fg-faint)}
.areapop .search input:focus{border-color:var(--fg-dim)}
.areapop .search .sicon{position:absolute; left:18px; top:50%; transform:translateY(-50%); color:var(--fg-faint); font-size:13px; pointer-events:none}
.arealist{max-height:min(340px, 52vh); overflow-y:auto; padding:4px}
.area-sec{font-size:10px; letter-spacing:.16em; text-transform:uppercase; color:var(--fg-faint); padding:9px 8px 5px}
.area-item{
  display:flex; align-items:center; gap:9px; padding:7px 8px;
  font-size:13px; color:var(--fg-dim); cursor:pointer; transition:.1s; letter-spacing:.02em;
}
.area-item:hover{background:rgba(var(--glow-rgb),.06); color:var(--fg)}
.area-item .box{width:15px; height:15px; border:1px solid var(--fg-dim); flex:0 0 auto; display:grid; place-items:center; color:var(--fg)}
.area-item .box::after{content:"×"; font-size:14px; line-height:1; opacity:0}
.area-item[aria-selected="true"]{color:var(--fg); text-shadow:var(--glow)}
.area-item[aria-selected="true"] .box{border-color:var(--fg); box-shadow:var(--glow)}
.area-item[aria-selected="true"] .box::after{opacity:1}
.area-item .cnt{margin-left:auto; font-size:11px; color:var(--fg-faint); font-variant-numeric:tabular-nums}
.areapop .foot{display:flex; justify-content:space-between; align-items:center; padding:8px 11px; border-top:1px solid var(--line)}
.area-empty{padding:22px; text-align:center; color:var(--fg-faint); font-size:12px; letter-spacing:.06em}

/* ============================== Responsive ============================== */
@media (max-width:760px){
  :root{ --cols: 46px 46px minmax(78px,110px) minmax(0,1fr); }
  .c-disc, .c-regio, .board-head .h-disc, .board-head .h-regio{display:none}
  .live-label{display:none}
  .sb-stat.today{display:none}
  .board-head{gap:0 10px}
  .row-line{gap:0 10px}
}
@media (max-width:380px){
  :root{ --cols: 44px 44px minmax(0,1fr); }
  .c-plaats, .board-head .h-plaats{display:none}
  .wordmark{font-size:16px; letter-spacing:.16em}
  .divider{display:none}
  .clock{display:none}
}
@media (prefers-reduced-motion:reduce){
  *{animation-duration:.001ms!important; transition-duration:.001ms!important}
  .board-body{scroll-behavior:auto}
}
</style>
</head>
<body>
<div class="crt" aria-hidden="true"></div>

<div class="app">
  <!-- ============ Status line ============ -->
  <header class="statusbar">
    <span class="wordmark">P2000</span>
    <span class="divider">////</span>
    <span class="live-label">MELDINGEN LIVE</span>
    <span class="clock" id="clock">--:--:--</span>

    <span class="sb-spacer"></span>

    <span class="sb-stat today">VANDAAG<b id="stToday">—</b></span>

      <span class="dot"></span><span id="connTxt">RECONNECT</span>
    </span>

    <span class="sb-tools">
      <button class="tbtn" id="crtBtn" title="CRT-effect aan/uit">[ CRT ]</button>
      <button class="tbtn" id="phosBtn" title="Fosfor amber/groen">[ AMBER ]</button>
      <button class="tbtn" id="bellBtn" title="Browsermeldingen aan/uit">[ BELL ]</button>

  <!-- ============ Controls ============ -->

    <div class="ctl-group" id="discTags"></div>
    <span class="ctl-sep"></span>

  </div>

  <!-- ============ Main ============ -->
  <div class="main">
    <!-- BOARD -->
    <section class="view active" id="viewBoard">
      <div class="board">
        <div class="board-head">
          <span class="h-tijd">TIJD</span>
          <span class="h-prio">PRIO</span>
          <span class="h-disc">DISC</span>
          <span class="h-plaats">PLAATS</span>

        </div>
        <div class="board-body" id="boardBody">
          <div class="skrow"></div><div class="skrow"></div><div class="skrow"></div>
          <div class="skrow"></div><div class="skrow"></div><div class="skrow"></div>

    <!-- MAP -->

      </div>

</div>

<!-- Area filter popover -->
<div class="areapop-backdrop" id="areaBackdrop"></div>
<div class="areapop" id="areaPop" role="dialog" aria-label="Filter op veiligheidsregio">
  <div class="search">
    <span class="sicon">⌕</span>
    <input id="areaSearch" type="text" placeholder="ZOEK VEILIGHEIDSREGIO…" autocomplete="off" spellcheck="false" />
  </div>
  <div class="arealist" id="areaList"></div>
  <div class="foot">
    <button class="tbtn" id="areaClear">[ WIS ]</button>
    <button class="tbtn on" id="areaClose">[ KLAAR ]</button>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js" crossorigin=""></script>
<script>
"use strict";
/* ============================================================ Config */
const DISCIPLINES = {
  ambulance:{label:"Ambulance", code:"AMBU", color:"var(--disc-ambulance)", raw:"#3ce084"},
  brandweer:{label:"Brandweer", code:"BRW",  color:"var(--disc-brandweer)", raw:"#ff9d3a"},
  politie:{label:"Politie",     code:"POL",  color:"var(--disc-politie)",   raw:"#5aa2ff"},
  knrm:{label:"KNRM",           code:"KNRM", color:"var(--disc-knrm)",      raw:"#3fe0e0"},
  other:{label:"Overig",        code:"OVR",  color:"var(--disc-other)",     raw:"#8b8172"},
};
const DISC_ORDER = ["ambulance","brandweer","politie","knrm","other"];
const MAX_MSG = 1000;
const NL_CENTER = [52.15, 5.3];

const REGIONS = ["Groningen","Fryslân","Drenthe","IJsselland","Twente","Noord- en Oost-Gelderland",
  "Gelderland-Midden","Gelderland-Zuid","Utrecht","Noord-Holland-Noord","Zaanstreek-Waterland","Kennemerland",
  "Amsterdam-Amstelland","Gooi en Vechtstreek","Haaglanden","Hollands Midden","Rotterdam-Rijnmond",
  "Zuid-Holland-Zuid","Zeeland","Midden- en West-Brabant","Brabant-Noord","Brabant-Zuidoost",
  "Limburg-Noord","Zuid-Limburg","Flevoland"];

const GLYPHS = {
  ambulance:'<path d="M12 6v12M6 12h12" stroke-width="3"/>',
  brandweer:'<path d="M12 3c2 3 4 4 4 7a4 4 0 0 1-8 0c0-1 .5-2 1-2 0 1 1 1.5 1.5 1 .5-1-.5-2 1.5-6Z" fill="currentColor" stroke="none"/>',
  politie:'<path d="M12 3l7 3v5c0 4-3 7-7 8-4-1-7-4-7-8V6l7-3Z" fill="currentColor" stroke="none"/>',
  knrm:'<path d="M12 3v10M12 13l6-3M12 13l-6-3M5 17c1.5 1.5 3 2 7 2s5.5-.5 7-2" stroke-width="2"/>',
  other:'<circle cx="12" cy="12" r="4" fill="currentColor" stroke="none"/>',
};

/* ============================================================ State */
const state = {
  byId:new Map(),
  order:[],
  markers:new Map(),
  discFilters:new Set(DISC_ORDER),
  urgentOnly:false,
  areas:new Set(),
  showTests:false,
  selected:null,
  follow:false,
  notify:false,
  view:"board",
  lastPan:0,
};

/* ============================================================ Prefs */
const PREFS_KEY="p2000-prefs";
function savePrefs(){
  try{ localStorage.setItem(PREFS_KEY, JSON.stringify({
    disc:[...state.discFilters], urgentOnly:state.urgentOnly, areas:[...state.areas],
    showTests:state.showTests, follow:state.follow, notify:state.notify,
    crt:document.documentElement.getAttribute("data-crt"),
    phos:document.documentElement.getAttribute("data-phos")
  })); }catch(e){}
}
function loadPrefs(){
  try{
    const p=JSON.parse(localStorage.getItem(PREFS_KEY)||"null"); if(!p) return;
    if(Array.isArray(p.disc)){ const s=new Set(p.disc.filter(d=>DISCIPLINES[d])); state.discFilters = s.size ? s : new Set(DISC_ORDER); }
    state.urgentOnly=!!p.urgentOnly;
    if(Array.isArray(p.areas)) state.areas=new Set(p.areas);
    state.showTests=!!p.showTests;
    state.follow=!!p.follow;
    state.notify=!!p.notify;
    if(p.crt==="off"||p.crt==="on") document.documentElement.setAttribute("data-crt",p.crt);
    if(p.phos==="amber"||p.phos==="green") document.documentElement.setAttribute("data-phos",p.phos);
  }catch(e){}
}

/* ============================================================ Utils */
const $ = s => document.querySelector(s);
const esc = s => (s==null?"":String(s)).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const norm = s => (s||"").toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g,"");
const pad2 = n => String(n).padStart(2,"0");
function hhmm(ms){ const d=new Date(ms); return pad2(d.getHours())+":"+pad2(d.getMinutes()); }
function relTime(ms){
  const d = Date.now()-ms; const s = Math.round(d/1000);
  if (s<10) return "nu";
  if (s<60) return s+"s";
  const m = Math.floor(s/60); if (m<60) return m+"m";
  const h = Math.floor(m/60); if (h<24) return h+"u";
  const dd = Math.floor(h/24); return dd+"d";
}
function priClass(p){
  if(!p || p.level==null) return "pm";
  if(p.level<=1) return "p1"; if(p.level===2) return "p2"; if(p.level===3) return "p3"; return "pm";
}
function priLabel(p){
  if(p && p.raw) return p.raw;
  if(p && p.level!=null) return "P"+p.level;
  return "—";
}
function cssId(id){ return id.replace(/[^a-zA-Z0-9_-]/g,"_"); }

/* ============================================================ Map */
const map = L.map("map",{zoomControl:false, attributionControl:true, preferCanvas:false, worldCopyJump:true})
  .setView(NL_CENTER, 8);
L.control.zoom({position:"bottomright"}).addTo(map);
L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",{
  attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/attributions">CARTO</a>',
  subdomains:"abcd", maxZoom:19, detectRetina:true
}).addTo(map);

const cluster = L.markerClusterGroup({
  showCoverageOnHover:false, maxClusterRadius:50, spiderfyOnMaxZoom:true, chunkedLoading:true,
  iconCreateFunction(c){
    const n=c.getChildCount();
    const big = n>=25 ? " big":"";
    const tally={};
    c.getAllChildMarkers().forEach(m=>{const d=m.options._disc||"other"; tally[d]=(tally[d]||0)+1;});
    let best="politie", bv=-1; for(const k in tally){ if(tally[k]>bv){bv=tally[k];best=k;} }
    const col=(DISCIPLINES[best]||DISCIPLINES.other).raw;
    return L.divIcon({html:`<div class="mcl${big}" style="background:${col};box-shadow:0 0 0 5px ${col}38, 0 0 14px ${col}80">${n}</div>`,
      className:"", iconSize:L.point(40,40)});
  }
});
map.addLayer(cluster);

/* ============================================================ Marker */
function makeMarker(m){
  const col = DISCIPLINES[m.discipline] ? DISCIPLINES[m.discipline].raw : DISCIPLINES.other.raw;
  const icon = L.divIcon({
    className:"", iconSize:L.point(0,0),
    html:`<div class="mk" data-id="${esc(m.id)}" style="--c:${col}">
      <span class="pulse"></span>
      <span class="glyph"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">${GLYPHS[m.discipline]||GLYPHS.other}</svg></span>
    </div>`
  });
  const mk = L.marker([m.geo.lat, m.geo.lon],{icon, _disc:m.discipline, riseOnHover:true, keyboard:false});
  mk.bindPopup(popupHTML(m),{closeButton:true, autoPanPadding:[40,40], offset:[0,-6]});
  mk.on("click", ()=>select(m.id,{fromMap:true}));
  return mk;
}
function subBits(m, forPop){
  const bits=[];
  if(m.region) bits.push(`<span class="rg">${esc(m.region)}</span>`);
  if(m.municipality && m.municipality!==m.city) bits.push(`<span>${esc(m.municipality)}</span>`);
  if(m.postcode) bits.push(`<span>${esc(m.postcode)}</span>`);
  if(!forPop && m.is_test) bits.push(`<span class="testtag">Test</span>`);
  return bits;
}
function popupHTML(m){
  const dc = DISCIPLINES[m.discipline]||DISCIPLINES.other;
  const bits = subBits(m, true);
  return `<div class="pop" style="--c:${dc.raw}">
    <div class="ptop">
      <span class="prio ${priClass(m.priority)}">${esc(priLabel(m.priority))}</span>
      <span class="pcity">${m.city?esc(m.city):"ONBEKEND"}</span>
    </div>
    ${bits.length?`<div class="pop-sub">${bits.join('<span class="sep">·</span>')}</div>`:""}
    <div class="pbody">${esc(m.body||m.raw||"")}</div>
    ${m.capcodes&&m.capcodes.length?`<div class="pcaps">${esc(m.capcodes.join("  ·  "))}</div>`:""}
    <div class="pfoot"><span class="pd">${esc(dc.label)}</span><span class="pt" data-ts="${m.ts_ms}">${relTime(m.ts_ms)}</span></div>
  </div>`;
}

/* ============================================================ Ingest */
function normalize(m){
  if(!m || m.id==null) return null;
  const disc = DISCIPLINES[m.discipline] ? m.discipline : "other";
  let ts = Number(m.ts_ms);
  if(!isFinite(ts) || ts<=0){ ts = m.received_at ? Date.parse(m.received_at) : Date.now(); }
  const geo = (m.geo && isFinite(m.geo.lat) && isFinite(m.geo.lon)) ? {lat:+m.geo.lat, lon:+m.geo.lon} : null;
  const priority = m.priority || {raw:null,scheme:null,level:null};
  const urgent = (m.urgent!=null) ? !!m.urgent : (priority.level===1);
  return {
    id:String(m.id), ts_ms:ts, received_at:m.received_at||null,
    capcodes:Array.isArray(m.capcodes)?m.capcodes:[],
    body:m.body||"", raw:m.raw||"", discipline:disc, priority, urgent,
    is_test:!!m.is_test,
    city:m.city||null, municipality:m.municipality||null, province:m.province||null,
    region:m.region||null, postcode:m.postcode||null, geo
  };
}
function insertSorted(id, ts){
  const ord = state.order;
  if(ord.length===0 || ts >= state.byId.get(ord[0]).ts_ms){ ord.unshift(id); return 0; }
  let lo=0, hi=ord.length;
  while(lo<hi){ const mid=(lo+hi)>>1; if(state.byId.get(ord[mid]).ts_ms > ts) lo=mid+1; else hi=mid; }
  ord.splice(lo,0,id); return lo;
}
function ingest(raw, live){
  const m = normalize(raw); if(!m) return null;
  if(state.byId.has(m.id)) return null; // dedupe
  state.byId.set(m.id, m);
  const idx = insertSorted(m.id, m.ts_ms);
  if(m.geo){
    const mk = makeMarker(m); state.markers.set(m.id, mk);
    if(passesFilter(m)) cluster.addLayer(mk);
  }
  while(state.order.length>MAX_MSG){
    const drop = state.order.pop();
    const mk = state.markers.get(drop);
    if(mk){ cluster.removeLayer(mk); state.markers.delete(drop); }
    state.byId.delete(drop);
    const el=document.getElementById("r_"+cssId(drop)); if(el) el.remove();
  }
  return {m, idx};
}

/* ============================================================ Filtering */
function passesFilter(m){
  if(!state.showTests && m.is_test) return false;
  if(!state.discFilters.has(m.discipline)) return false;
  if(state.urgentOnly && !m.urgent) return false;
  if(state.areas.size){
    if(!(m.region && state.areas.has("region:"+m.region))) return false;
  }
  return true;
}
function filtersActive(){
  return state.discFilters.size!==DISC_ORDER.length || state.urgentOnly || state.areas.size>0 || state.showTests;
}
function afterFilterChange(){
  syncDiscTags(); syncFilterBar(); updateDiscCounts();
  rebuildBoard(); applyMarkerFilter(); savePrefs();
}

/* ============================================================ Row DOM */
function detailHTML(m){
  const dc=DISCIPLINES[m.discipline]||DISCIPLINES.other;
  const rows=[];
  const add=(k,v)=>{ if(v) rows.push(`<div class="d-row"><span class="d-k">${k}</span><span class="d-v">${esc(v)}</span></div>`); };
  add("PRIO", priLabel(m.priority)+(m.priority&&m.priority.scheme?" / "+m.priority.scheme:""));
  add("DISC", dc.label);
  add("REGIO", m.region);
  add("GEMEENTE", m.municipality);
  add("PLAATS", m.city);
  add("POSTCODE", m.postcode);
  if(m.geo) add("COORD", m.geo.lat.toFixed(5)+", "+m.geo.lon.toFixed(5));
  add("TIJD", new Date(m.ts_ms).toLocaleString("nl-NL"));
  if(m.is_test) add("TYPE","TESTMELDING / OEFENING");
  if(m.capcodes.length) add("CAPCODES", m.capcodes.join("   "));
  let out=`<div class="d-body">${esc(m.body||m.raw||"—")}</div>`+rows.join("");
  if(m.raw) out+=`<div class="d-raw">${esc(m.raw)}</div>`;
  if(m.geo) out+=`<div class="d-actions"><button class="tbtn map-jump" type="button">[ TOON OP KAART ]</button></div>`;
  return out;
}
function rowEl(m){
  const dc = DISCIPLINES[m.discipline]||DISCIPLINES.other;
  const el = document.createElement("div");
  el.className="row"; el.id="r_"+cssId(m.id);
  el.style.setProperty("--c", dc.raw);
  el.dataset.id=m.id; el.dataset.disc=m.discipline;
  const body = esc(m.body||m.raw||"—");
  const tt = m.is_test ? '<span class="tt">TEST</span>' : "";
  el.innerHTML =
    `<div class="row-line" role="button" tabindex="0" aria-expanded="false">
       <span class="cell c-tijd">${hhmm(m.ts_ms)}</span>
       <span class="cell c-prio"><span class="prio ${priClass(m.priority)}">${esc(priLabel(m.priority))}</span></span>
       <span class="cell c-disc">${dc.code}</span>
       <span class="cell c-plaats${m.city?"":" nocity"}">${m.city?esc(m.city):"— onbekend"}</span>
       <span class="cell c-regio">${m.region?esc(m.region):"—"}</span>
       <span class="cell c-msg">${body}${tt}</span>
     </div>
     <div class="row-detail">${detailHTML(m)}</div>`;
  const line = el.querySelector(".row-line");
  const toggle=()=>{
    const open = el.classList.toggle("expanded");
    line.setAttribute("aria-expanded", open?"true":"false");
    state.selected = open ? m.id : (state.selected===m.id?null:state.selected);
    markSelectedDom();
  };
  line.addEventListener("click", toggle);
  line.addEventListener("keydown", e=>{ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); toggle(); } });
  const jump = el.querySelector(".map-jump");
  if(jump) jump.addEventListener("click", e=>{ e.stopPropagation(); select(m.id,{focus:true, switchToMap:true}); });
  return el;
}

/* ============================================================ Board render */
const boardBody = $("#boardBody");
function clearSkeletons(){ boardBody.querySelectorAll(".skrow").forEach(s=>s.remove()); }
function firstRow(){ return boardBody.querySelector(".row"); }
function rebuildBoard(){
  clearSkeletons();
  const frag=document.createDocumentFragment();
  let n=0;
  for(const id of state.order){
    const m=state.byId.get(id); if(!m) continue;
    if(!passesFilter(m)) continue;
    frag.appendChild(rowEl(m)); n++;
  }
  boardBody.querySelectorAll(".row").forEach(r=>r.remove());
  boardBody.insertBefore(frag, boardBody.firstChild);
  const e=$("#boardEmpty");
  e.innerHTML = filtersActive()
    ? "GEEN MELDINGEN BINNEN FILTER <span class=\"blink\">_</span>"
    : "AWAITING SIGNAL <span class=\"blink\">_</span>";
  e.classList.toggle("show", n===0);
  $("#boardCount").textContent=n;
  if(state.selected) markSelectedDom();
}
function prependRow(m){
  clearSkeletons();
  if(!passesFilter(m)){ updateVisibleCounts(); return; }
  $("#boardEmpty").classList.remove("show");
  const atTop = boardBody.scrollTop <= 4;
  const row=rowEl(m);
  row.classList.add("enter","flash");
  boardBody.insertBefore(row, firstRow());
  if(!atTop){
    // keep the user's viewport fixed: offset scroll by the new row's height
    boardBody.scrollTop += row.offsetHeight;
  }
  setTimeout(()=>row.classList.remove("flash"), 1700);
  updateVisibleCounts();
}
function updateVisibleCounts(){
  let n=0; for(const id of state.order){ const x=state.byId.get(id); if(x&&passesFilter(x)) n++; }
  $("#boardCount").textContent=n;
}

/* ============================================================ Selection */
function markSelectedDom(){
  boardBody.querySelectorAll(".row.sel").forEach(c=>c.classList.remove("sel"));
  if(state.selected){
    const el=document.getElementById("r_"+cssId(state.selected)); if(el) el.classList.add("sel");
  }
  state.markers.forEach((mk,id)=>{
    const node=mk.getElement&&mk.getElement();
    const inner=node&&node.querySelector(".mk");
    if(inner) inner.classList.toggle("sel", id===state.selected);
  });
}
function select(id, opts={}){
  state.selected=id;
  const m=state.byId.get(id);
  if(opts.switchToMap){ setView("map"); }
  markSelectedDom();
  if(m && m.geo && (opts.focus||opts.switchToMap||opts.fromMap)){
    const doFocus=()=>{
      map.setView([m.geo.lat,m.geo.lon], Math.max(map.getZoom(),13),{animate:true});
      const mk=state.markers.get(id);
      if(mk){ cluster.zoomToShowLayer(mk, ()=>{ mk.openPopup(); }); }
    };
    if(opts.switchToMap) setTimeout(()=>{ map.invalidateSize(); doFocus(); }, 60);
    else if(!opts.fromMap) doFocus();
  }
}

/* ============================================================ Discipline tags */
function buildDiscTags(){
  const c=$("#discTags"); c.innerHTML="";
  DISC_ORDER.forEach(d=>{
    const dc=DISCIPLINES[d];
    const b=document.createElement("button");
    b.className="dtag-btn"; b.style.setProperty("--c",dc.raw);
    b.setAttribute("aria-pressed", state.discFilters.has(d)?"true":"false");
    b.dataset.disc=d;
    b.innerHTML=`[ ${dc.code} <span class="dcnt" data-cnt="${d}">0</span> ]`;
    b.addEventListener("click",()=>toggleDiscipline(d));
    c.appendChild(b);
  });
}
function toggleDiscipline(d){
  if(state.discFilters.has(d)){ if(state.discFilters.size>1) state.discFilters.delete(d); else return; }
  else state.discFilters.add(d);
  afterFilterChange();
}
function syncDiscTags(){
  document.querySelectorAll(".dtag-btn").forEach(c=>{
    c.setAttribute("aria-pressed", state.discFilters.has(c.dataset.disc)?"true":"false");
  });
}
function applyMarkerFilter(){
  cluster.clearLayers();
  const add=[];
  for(const id of state.order){
    const m=state.byId.get(id);
    if(m&&m.geo&&passesFilter(m)){ const mk=state.markers.get(id); if(mk) add.push(mk); }
  }
  if(add.length) cluster.addLayers(add);
}
function updateDiscCounts(){
  const t={}; DISC_ORDER.forEach(d=>t[d]=0);
  for(const id of state.order){ const m=state.byId.get(id); if(!m) continue;
    if(!state.showTests && m.is_test) continue;
    t[m.discipline]=(t[m.discipline]||0)+1; }
  document.querySelectorAll("[data-cnt]").forEach(el=>{ el.textContent=t[el.dataset.cnt]||0; });
}

/* ============================================================ Filter bar */
const FILTERBAR_HTML =
  `<button class="tbtn urgent" type="button" data-role="urgent" aria-pressed="false" title="Alleen urgente meldingen (A1/P1)">[ URGENT ]</button>
   <button class="tbtn area" type="button" data-role="area" aria-haspopup="dialog" title="Filter op veiligheidsregio">[ REGIO<span class="cnt" hidden></span> ▾ ]</button>
   <button class="tbtn tests" type="button" data-role="tests" aria-pressed="false" title="Toon testmeldingen">[ TESTS ]</button>
   <button class="tbtn follow" type="button" data-role="follow" aria-pressed="false" title="Volg nieuwe meldingen (spring naar boven / pan kaart)">[ FOLLOW ]</button>
   <button class="tbtn reset" type="button" data-role="reset" hidden title="Alle filters wissen">[ RESET ]</button>`;
function buildFilterBar(){
  const c=$("#filterBar");
  c.innerHTML=FILTERBAR_HTML;
  c.querySelector('[data-role=urgent]').addEventListener("click",()=>{ state.urgentOnly=!state.urgentOnly; afterFilterChange(); });
  c.querySelector('[data-role=tests]').addEventListener("click",()=>{ state.showTests=!state.showTests; afterFilterChange(); });
  c.querySelector('[data-role=area]').addEventListener("click",e=>openAreaPop(e.currentTarget));
  c.querySelector('[data-role=follow]').addEventListener("click",toggleFollow);
  c.querySelector('[data-role=reset]').addEventListener("click",resetFilters);
}
function syncFilterBar(){
  const active=filtersActive();
  const u=$('[data-role=urgent]'); if(u){ u.classList.toggle("on",state.urgentOnly); u.setAttribute("aria-pressed",state.urgentOnly?"true":"false"); }
  const t=$('[data-role=tests]'); if(t){ t.classList.toggle("on",state.showTests); t.setAttribute("aria-pressed",state.showTests?"true":"false"); }
  const a=$('[data-role=area]'); if(a){
    a.classList.toggle("on",state.areas.size>0);
    const cn=a.querySelector(".cnt"); if(cn){ cn.textContent=" "+state.areas.size; cn.hidden=state.areas.size===0; }
  }
  const r=$('[data-role=reset]'); if(r) r.hidden=!active;
}
function resetFilters(){
  state.discFilters=new Set(DISC_ORDER);
  state.urgentOnly=false; state.areas.clear(); state.showTests=false;
  afterFilterChange();
}
function toggleFollow(){
  state.follow=!state.follow;
  const f=$('[data-role=follow]'); if(f){ f.classList.toggle("on",state.follow); f.setAttribute("aria-pressed",state.follow?"true":"false"); }
  savePrefs();
}

/* ============================================================ Area popover */
function areaTallies(){
  const tR={};
  for(const id of state.order){ const m=state.byId.get(id); if(!m) continue;
    if(!state.showTests && m.is_test) continue;
    if(m.region) tR[m.region]=(tR[m.region]||0)+1; }
  return {tR};
}
function renderAreaList(q){
  const list=$("#areaList"); const nq=norm(q);
  const {tR}=areaTallies();
  const regs=[...REGIONS]; Object.keys(tR).forEach(r=>{ if(!regs.includes(r)) regs.push(r); });
  let html="";
  const items=regs.filter(v=>!nq||norm(v).includes(nq));
  if(items.length){
    html+=`<div class="area-sec">Veiligheidsregio's</div>`;
    items.forEach(v=>{
      const key="region:"+v; const on=state.areas.has(key); const c=tR[v]||0;
      html+=`<div class="area-item" role="button" tabindex="0" data-key="${esc(key)}" aria-selected="${on?"true":"false"}">
        <span class="box"></span><span>${esc(v)}</span>${c?`<span class="cnt">${c}</span>`:""}</div>`;
    });
  }
  if(!html) html=`<div class="area-empty">Geen regio gevonden voor “${esc(q)}”.</div>`;
  list.innerHTML=html;
  list.querySelectorAll(".area-item").forEach(it=>{
    const key=it.dataset.key;
    const act=()=>toggleArea(key);
    it.addEventListener("click",act);
    it.addEventListener("keydown",e=>{ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); act(); } });
  });
}
function toggleArea(key){
  if(state.areas.has(key)) state.areas.delete(key); else state.areas.add(key);
  afterFilterChange();
  renderAreaList($("#areaSearch").value);
}
function positionAreaPop(anchor){
  const pop=$("#areaPop");
  if(window.innerWidth<=560){
    pop.style.left="50%"; pop.style.top="auto"; pop.style.bottom="14px";
    pop.style.transform="translateX(-50%)"; pop.style.width="min(360px, calc(100vw - 24px))";
    return;
  }
  const r=anchor.getBoundingClientRect();
  const w=320; pop.style.width=w+"px"; pop.style.transform=""; pop.style.bottom="auto";
  let left=r.left; if(left+w>window.innerWidth-12) left=window.innerWidth-12-w; if(left<12) left=12;
  let top=r.bottom+8; const maxTop=window.innerHeight-40;
  if(top>maxTop-260) top=Math.max(12, r.top-8-Math.min(420, window.innerHeight*0.6));
  pop.style.left=left+"px"; pop.style.top=top+"px";
}
function openAreaPop(anchor){
  renderAreaList("");
  $("#areaSearch").value="";
  positionAreaPop(anchor);
  $("#areaPop").classList.add("show"); $("#areaBackdrop").classList.add("show");
  setTimeout(()=>{ try{$("#areaSearch").focus();}catch(e){} }, 60);
}
function closeAreaPop(){ $("#areaPop").classList.remove("show"); $("#areaBackdrop").classList.remove("show"); }
$("#areaSearch").addEventListener("input",e=>renderAreaList(e.target.value));
$("#areaClear").addEventListener("click",()=>{ state.areas.clear(); afterFilterChange(); renderAreaList($("#areaSearch").value); });
$("#areaClose").addEventListener("click",closeAreaPop);
$("#areaBackdrop").addEventListener("click",closeAreaPop);
document.addEventListener("keydown",e=>{ if(e.key==="Escape") closeAreaPop(); });

/* ============================================================ Counters + clock */
function updateCounters(){
  const now=Date.now(), hourAgo=now-3600e3;
  const midnight=new Date(); midnight.setHours(0,0,0,0); const mid=midnight.getTime();
  let today=0, hour=0;
  for(const id of state.order){ const m=state.byId.get(id); if(!m) continue;
    if(!state.showTests && m.is_test) continue;
    if(m.ts_ms>=mid) today++; if(m.ts_ms>=hourAgo) hour++; }
  $("#stToday").textContent=today; $("#stHour").textContent=hour;
}
function tickClock(){
  const d=new Date();
  $("#clock").textContent=pad2(d.getHours())+":"+pad2(d.getMinutes())+":"+pad2(d.getSeconds());
}
setInterval(tickClock,1000); tickClock();

/* ============================================================ Live pulse / pill */
function onNewLive(m){
  prependRow(m);
  updateDiscCounts(); updateCounters();
  const visible = passesFilter(m);
  if(state.follow && state.view==="board" && visible){
    boardBody.scrollTo({top:0, behavior:"smooth"});
  }
  if(m.geo && visible){
    const mk=state.markers.get(m.id);
    if(mk){
      const el=mk.getElement&&mk.getElement(); const inner=el&&el.querySelector(".mk");
      if(inner){ inner.classList.add("new"); setTimeout(()=>inner.classList.remove("new"),5000); }
    }
    if(state.follow && state.view==="map"){
      const now=Date.now();
      if(now-state.lastPan>3500){ state.lastPan=now; map.panTo([m.geo.lat,m.geo.lon],{animate:true, duration:.9, easeLinearity:.25}); }
      else showLivePill(m);
    } else if(state.view==="map"){
      showLivePill(m);
    }
  }
  if(visible) queueNotify(m);
  hideEmpty();
}
let pillTimer=null;
function showLivePill(m){
  const p=$("#livepill"); const dc=DISCIPLINES[m.discipline]||DISCIPLINES.other;
  p.style.setProperty("--c",dc.raw);
  $("#livepillTxt").textContent=(m.city?m.city:"NIEUWE MELDING")+" · "+dc.label;
  p.classList.add("show");
  p.onclick=()=>{ if(m.geo){ map.setView([m.geo.lat,m.geo.lon],13,{animate:true}); select(m.id,{focus:true}); } p.classList.remove("show"); };
  clearTimeout(pillTimer); pillTimer=setTimeout(()=>p.classList.remove("show"),4200);
}

/* ============================================================ Notifications */
const notifyQ={list:[], timer:null};
function bellSupported(){ return typeof Notification!=="undefined"; }
function updateBellUI(){
  const b=$("#bellBtn");
  b.classList.toggle("on", state.notify);
  const denied = bellSupported() && Notification.permission==="denied";
  b.textContent = state.notify ? "[ BELL* ]" : "[ BELL ]";
  b.style.color = denied ? "var(--pr1)" : "";
  b.title = !bellSupported() ? "Meldingen niet ondersteund"
          : state.notify ? "Browsermeldingen aan"
          : denied ? "Meldingen geblokkeerd in de browser"
          : "Browsermeldingen uit";
}
async function toggleNotify(){
  if(!bellSupported()){ updateBellUI(); return; }
  if(state.notify){ state.notify=false; updateBellUI(); savePrefs(); return; }
  if(Notification.permission==="granted"){ state.notify=true; }
  else if(Notification.permission!=="denied"){
    let p="denied"; try{ p=await Notification.requestPermission(); }catch(e){}
    state.notify = (p==="granted");
  } else { state.notify=false; }
  updateBellUI(); savePrefs();
}
function queueNotify(m){
  if(!state.notify || !bellSupported() || Notification.permission!=="granted") return;
  notifyQ.list.push(m);
  if(notifyQ.timer) return;
  notifyQ.timer=setTimeout(flushNotify, 1200);
}
function flushNotify(){
  notifyQ.timer=null;
  const q=notifyQ.list.splice(0); if(!q.length) return;
  try{
    if(q.length===1){
      const m=q[0]; const dc=DISCIPLINES[m.discipline]||DISCIPLINES.other;
      const title=`${priLabel(m.priority)} · ${dc.label}${m.city?" · "+m.city:""}`;
      const body=(m.body||m.raw||"").slice(0,140);
      fireNotification(title, body, m);
    } else {
      const names=q.slice(0,4).map(x=>x.city||(DISCIPLINES[x.discipline]||DISCIPLINES.other).label);
      fireNotification(`${q.length} nieuwe meldingen`, names.join(", ")+(q.length>4?" …":""), q[0]);
    }
  }catch(e){}
}
function fireNotification(title, body, m){
  try{
    const n=new Notification(title,{body, tag:"p2000-"+(m?m.id:Date.now()), renotify:false});
    n.onclick=()=>{ try{window.focus();}catch(e){} if(m&&m.geo){ setView("map"); select(m.id,{focus:true}); } n.close(); };
  }catch(e){}
}
$("#bellBtn").addEventListener("click",toggleNotify);

/* ============================================================ Empty state */
let hasData=false;
function hideEmpty(){ if(!hasData){ hasData=true; } }

/* ============================================================ View toggle */
let mapFitted=false;
function fitMarkers(){
  const pts=[];
  state.markers.forEach((mk,id)=>{ const m=state.byId.get(id); if(m&&passesFilter(m)) pts.push(mk.getLatLng()); });
  if(pts.length){ try{ map.fitBounds(L.latLngBounds(pts).pad(.15),{maxZoom:11, animate:false}); return true; }catch(e){} }
  return false;
}
function setView(v){
  if(state.view===v) return;
  state.view=v;
  const isMap=v==="map";
  $("#viewBoard").classList.toggle("active",!isMap);
  $("#viewMap").classList.toggle("active",isMap);
  const vb=$("#viewBtn");
  vb.textContent = isMap ? "[ BORD ]" : "[ KAART ]";
  vb.title = isMap ? "Terug naar board" : "Naar kaart";
  if(isMap){
    const settle=()=>{
      map.invalidateSize(true);
      if(!mapFitted && map.getSize().x>0){
        mapFitted=true;
        if(!fitMarkers()) map.setView(NL_CENTER, 8, {animate:false});
      }
    };
    requestAnimationFrame(()=>requestAnimationFrame(settle));
    setTimeout(settle, 120);
  }
}
$("#viewBtn").addEventListener("click",()=>setView(state.view==="map"?"board":"map"));

/* ============================================================ CRT + phosphor */
function applyToolUI(){
  const crtOn = document.documentElement.getAttribute("data-crt")!=="off";
  $("#crtBtn").classList.toggle("on", crtOn);
  const green = document.documentElement.getAttribute("data-phos")==="green";
  const pb=$("#phosBtn");
  pb.textContent = green ? "[ GREEN ]" : "[ AMBER ]";
  pb.classList.add("on");
}
$("#crtBtn").addEventListener("click",()=>{
  const off = document.documentElement.getAttribute("data-crt")==="off";
  document.documentElement.setAttribute("data-crt", off?"on":"off");
  applyToolUI(); savePrefs();
});
$("#phosBtn").addEventListener("click",()=>{
  const green = document.documentElement.getAttribute("data-phos")==="green";
  document.documentElement.setAttribute("data-phos", green?"amber":"green");
  document.querySelector('meta[name=theme-color]').setAttribute("content", green?"#0b0a08":"#050805");
  applyToolUI(); savePrefs();
});

/* ============================================================ Tick relative times */
setInterval(()=>{
  document.querySelectorAll(".pt[data-ts]").forEach(el=>{ el.textContent=relTime(+el.dataset.ts); });
  updateCounters();
}, 15000);

/* ============================================================ Data load */
async function loadInitial(){
  try{
    const r=await fetch("/api/messages?limit=200",{headers:{Accept:"application/json"}});
    if(!r.ok) throw new Error("HTTP "+r.status);
    const arr=await r.json();
    if(Array.isArray(arr)){
      for(let i=arr.length-1;i>=0;i--){ ingest(arr[i],false); }
      rebuildBoard(); updateDiscCounts(); updateCounters();
      if(state.order.length){ hideEmpty();
        if(state.view==="map"){ mapFitted=true; fitMarkers(); }
      }
    }
  }catch(e){ console.warn("initial load failed",e); rebuildBoard(); }
}

/* ============================================================ SSE */
let es=null, esRetry=0, reconnTimer=null;
function setConn(s){
  const c=$("#conn"); c.classList.remove("live","reconnecting","down");
  c.classList.add(s);
  $("#connTxt").textContent = s==="live"?"LIVE": s==="reconnecting"?"RECONNECT":"OFFLINE";
}
function connectSSE(){
  setConn("reconnecting");
  try{ es=new EventSource("/events"); }catch(e){ scheduleReconnect(); return; }
  es.addEventListener("open",()=>{ esRetry=0; setConn("live"); });
  const handle=ev=>{
    let data; try{ data=JSON.parse(ev.data); }catch(e){ return; }
    const res=ingest(data,true);
    if(res){ onNewLive(res.m); }
  };
  es.addEventListener("message",handle);
  es.onerror=()=>{ setConn("reconnecting"); if(es.readyState===2){ try{es.close();}catch(e){} scheduleReconnect(); } };
}
function scheduleReconnect(){
  clearTimeout(reconnTimer);
  esRetry++;
  const delay=Math.min(1000*Math.pow(1.7,Math.min(esRetry,6)), 15000);
  setConn(esRetry>3?"down":"reconnecting");
  reconnTimer=setTimeout(connectSSE, delay);
}
document.addEventListener("visibilitychange",()=>{
  if(!document.hidden && es && es.readyState===2){ esRetry=0; connectSSE(); }
});

/* ============================================================ Boot */
loadPrefs();
if(state.notify && (!bellSupported() || Notification.permission!=="granted")) state.notify=false;
buildDiscTags();
buildFilterBar();
applyToolUI();
$('[data-role=follow]').classList.toggle("on", state.follow);
$('[data-role=follow]').setAttribute("aria-pressed", state.follow?"true":"false");
updateBellUI(); syncDiscTags(); syncFilterBar();
loadInitial().then(connectSSE);
setTimeout(()=>map.invalidateSize(),120);
window.addEventListener("resize",()=>{ if(state.view==="map") map.invalidateSize(); });
</script>
