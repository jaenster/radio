<!doctype html>
<html lang="nl" data-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, viewport-fit=cover" />
<meta name="color-scheme" content="dark light" />
<meta name="theme-color" content="#0a0c10" />
<title>P2000 — Live meldingen</title>

<link rel="preconnect" href="https://unpkg.com" crossorigin />
<link rel="preconnect" href="https://a.basemaps.cartocdn.com" crossorigin />
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" crossorigin="" />

<style>
/* ============================== Design tokens ============================== */
:root{
  --disc-ambulance:#10b981;
  --disc-brandweer:#f97316;
  --disc-politie:#3b82f6;
  --disc-knrm:#22d3ee;
  --disc-other:#94a3b8;

  --pr1:#ef4444;   /* most urgent */
  --pr2:#f59e0b;
  --pr3:#38bdf8;
  --pr-muted:#64748b;

  --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial,
          "Apple Color Emoji","Segoe UI Emoji", sans-serif;
  --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;

  --r-lg:18px; --r-md:13px; --r-sm:9px;
  --ease:cubic-bezier(.22,.61,.36,1);
  --sh-1:0 1px 2px rgba(0,0,0,.35);
  --sh-2:0 8px 30px rgba(0,0,0,.45);
  --sh-pop:0 18px 60px rgba(0,0,0,.55);
}

/* Dark (default) */
:root, :root[data-theme="dark"]{
  --bg:#0a0c10;
  --bg-grad:radial-gradient(1200px 700px at 78% -8%, rgba(59,130,246,.10), transparent 60%),
            radial-gradient(900px 600px at -6% 108%, rgba(16,185,129,.08), transparent 55%);
  --panel:rgba(19,23,31,.72);
  --panel-solid:#12161d;
  --panel-2:rgba(255,255,255,.035);
  --hair:rgba(255,255,255,.09);
  --hair-strong:rgba(255,255,255,.16);
  --txt:#e9edf4;
  --txt-2:#aab4c2;
  --txt-3:#6b7686;
  --chip:rgba(255,255,255,.06);
  --chip-on:rgba(255,255,255,.14);
  --glass-blur:saturate(180%) blur(22px);
  --card-hover:rgba(255,255,255,.045);
  --sel:rgba(59,130,246,.14);
  --scrim:linear-gradient(180deg, rgba(10,12,16,0), rgba(10,12,16,.85));
}
/* Light */
:root[data-theme="light"]{
  --bg:#eef1f6;
  --bg-grad:radial-gradient(1200px 700px at 80% -10%, rgba(59,130,246,.14), transparent 60%),
            radial-gradient(900px 600px at -6% 110%, rgba(16,185,129,.12), transparent 55%);
  --panel:rgba(255,255,255,.78);
  --panel-solid:#ffffff;
  --panel-2:rgba(15,23,42,.03);
  --hair:rgba(15,23,42,.10);
  --hair-strong:rgba(15,23,42,.18);
  --txt:#0f1722;
  --txt-2:#45536a;
  --txt-3:#7e8aa0;
  --chip:rgba(15,23,42,.05);
  --chip-on:rgba(15,23,42,.12);
  --glass-blur:saturate(180%) blur(20px);
  --card-hover:rgba(15,23,42,.035);
  --sel:rgba(59,130,246,.12);
  --scrim:linear-gradient(180deg, rgba(238,241,246,0), rgba(238,241,246,.9));
  --sh-2:0 10px 34px rgba(31,41,55,.16);
  --sh-pop:0 20px 60px rgba(31,41,55,.22);
}

*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0; font-family:var(--font); color:var(--txt);
  background:var(--bg-grad), var(--bg); background-attachment:fixed;
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  overflow:hidden; overscroll-behavior:none;
  font-feature-settings:"cv02","cv03","ss01";
}
button{font-family:inherit; color:inherit; cursor:pointer}
::selection{background:rgba(59,130,246,.35)}

/* thin scrollbars */
*{scrollbar-width:thin; scrollbar-color:var(--hair-strong) transparent}
*::-webkit-scrollbar{width:8px; height:8px}
*::-webkit-scrollbar-thumb{background:var(--hair-strong); border-radius:20px}
*::-webkit-scrollbar-track{background:transparent}

/* ============================== Layout shell ============================== */
.app{display:flex; flex-direction:column; height:100%; height:100dvh}

.topbar{
  position:relative; z-index:1200; flex:0 0 auto;
  display:flex; align-items:center; gap:14px;
  padding:11px max(14px, env(safe-area-inset-left)) 11px max(14px, env(safe-area-inset-left));
  padding-top:max(11px, env(safe-area-inset-top));
  background:var(--panel); backdrop-filter:var(--glass-blur); -webkit-backdrop-filter:var(--glass-blur);
  border-bottom:1px solid var(--hair);
}
.brand{display:flex; align-items:center; gap:11px; min-width:0}
.logo{
  width:34px; height:34px; border-radius:10px; flex:0 0 auto; position:relative;
  background:conic-gradient(from 210deg, var(--disc-politie), var(--disc-knrm), var(--disc-ambulance), var(--disc-brandweer), var(--disc-politie));
  box-shadow:0 0 0 1px var(--hair-strong) inset, 0 6px 18px rgba(59,130,246,.35);
  display:grid; place-items:center;
}
.logo::after{content:""; position:absolute; inset:5px; border-radius:6px; background:var(--panel-solid)}
.logo svg{position:relative; z-index:1; width:17px; height:17px}
.brand-txt{display:flex; flex-direction:column; line-height:1; min-width:0}
.brand-title{font-size:16px; font-weight:700; letter-spacing:.14em}
.brand-sub{font-size:10.5px; color:var(--txt-3); letter-spacing:.14em; text-transform:uppercase; margin-top:4px; white-space:nowrap}

.spacer{flex:1 1 auto}

/* counters */
.stats{display:flex; align-items:stretch; gap:8px}
.stat{
  display:flex; flex-direction:column; justify-content:center; min-width:64px;
  padding:5px 12px; border-radius:var(--r-md);
  background:var(--panel-2); border:1px solid var(--hair);
}
.stat .n{font-size:16px; font-weight:700; letter-spacing:-.01em; font-variant-numeric:tabular-nums; line-height:1}
.stat .l{font-size:9.5px; color:var(--txt-3); text-transform:uppercase; letter-spacing:.1em; margin-top:5px}

/* view toggle */
.seg{display:inline-flex; padding:3px; gap:3px; background:var(--panel-2); border:1px solid var(--hair); border-radius:12px}
.seg button{
  border:0; background:transparent; color:var(--txt-2); font-size:13px; font-weight:600;
  padding:7px 15px; border-radius:9px; display:inline-flex; align-items:center; gap:7px;
  transition:color .2s var(--ease), background .25s var(--ease), box-shadow .25s var(--ease);
}
.seg button svg{width:15px; height:15px; opacity:.85}
.seg button[aria-selected="true"]{background:var(--panel-solid); color:var(--txt); box-shadow:var(--sh-1)}

/* icon buttons */
.iconbtn{
  width:38px; height:38px; border-radius:11px; border:1px solid var(--hair);
  background:var(--panel-2); display:grid; place-items:center; color:var(--txt-2);
  transition:transform .18s var(--ease), background .2s var(--ease), color .2s var(--ease), border-color .2s;
}
.iconbtn:hover{color:var(--txt); border-color:var(--hair-strong); background:var(--card-hover)}
.iconbtn:active{transform:scale(.94)}
.iconbtn svg{width:18px; height:18px}
.iconbtn.on{color:var(--txt); border-color:var(--hair-strong)}
.iconbtn .moon{display:none}
:root[data-theme="light"] .iconbtn .sun{display:none}
:root[data-theme="light"] .iconbtn .moon{display:block}

/* connection dot */
.conn{display:inline-flex; align-items:center; gap:8px; padding:0 11px 0 10px; height:38px;
  border-radius:11px; border:1px solid var(--hair); background:var(--panel-2);
  font-size:11.5px; color:var(--txt-2); font-weight:600; letter-spacing:.02em}
.dot{width:8px; height:8px; border-radius:50%; background:var(--disc-other); position:relative; flex:0 0 auto}
.conn.live .dot{background:var(--disc-ambulance)}
.conn.live .dot::after{content:""; position:absolute; inset:0; border-radius:50%; background:inherit;
  animation:ping 1.8s var(--ease) infinite}
.conn.reconnecting .dot{background:var(--pr2); animation:blink 1s steps(2,end) infinite}
.conn.down .dot{background:var(--pr1)}
.conn .txt{white-space:nowrap}
@keyframes ping{0%{transform:scale(1);opacity:.7}70%,100%{transform:scale(3.2);opacity:0}}
@keyframes blink{50%{opacity:.25}}

/* ============================== Main region ============================== */
.main{position:relative; flex:1 1 auto; min-height:0; display:flex}

/* ---- Map view ---- */
.mapwrap{position:absolute; inset:0; display:flex}
#map{flex:1 1 auto; height:100%; background:var(--bg); z-index:1}
.leaflet-container{background:var(--bg); font-family:var(--font)}

/* side list (desktop) / bottom sheet (mobile) */
.side{
  position:relative; z-index:600; flex:0 0 380px; width:380px; height:100%;
  display:flex; flex-direction:column;
  background:var(--panel); backdrop-filter:var(--glass-blur); -webkit-backdrop-filter:var(--glass-blur);
  border-left:1px solid var(--hair);
}
.side-head{padding:13px 15px 11px; border-bottom:1px solid var(--hair); flex:0 0 auto}
.side-head .row{display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:11px}
.side-title{font-size:13px; font-weight:700; letter-spacing:.02em; display:flex; align-items:center; gap:8px}
.side-title .count{font-size:11px; color:var(--txt-3); font-weight:600; font-variant-numeric:tabular-nums}
.followbtn{font-size:11px; font-weight:600; color:var(--txt-2); background:var(--chip); border:1px solid var(--hair);
  padding:5px 10px; border-radius:9px; display:inline-flex; align-items:center; gap:6px; transition:.2s var(--ease)}
.followbtn.on{color:var(--txt); background:var(--chip-on); border-color:var(--hair-strong)}
.followbtn .fdot{width:6px; height:6px; border-radius:50%; background:var(--txt-3)}
.followbtn.on .fdot{background:var(--disc-ambulance); box-shadow:0 0 8px var(--disc-ambulance)}

/* discipline filter chips */
.chips{display:flex; flex-wrap:wrap; gap:7px}
.chip{
  display:inline-flex; align-items:center; gap:7px; padding:6px 11px 6px 9px;
  border-radius:999px; border:1px solid var(--hair); background:var(--chip);
  color:var(--txt-2); font-size:12px; font-weight:600; letter-spacing:.01em;
  transition:.18s var(--ease); user-select:none;
}
.chip:hover{border-color:var(--hair-strong); color:var(--txt)}
.chip .swatch{width:9px; height:9px; border-radius:50%; background:var(--c); box-shadow:0 0 0 3px color-mix(in srgb, var(--c) 22%, transparent)}
.chip[aria-pressed="true"]{color:var(--txt); background:var(--chip-on); border-color:color-mix(in srgb, var(--c) 55%, var(--hair-strong))}
.chip[aria-pressed="false"]{opacity:.55}
.chip[aria-pressed="false"] .swatch{box-shadow:none; opacity:.7}
.chip .cnt{font-size:10.5px; color:var(--txt-3); font-variant-numeric:tabular-nums; min-width:1ch; text-align:right}

.list{flex:1 1 auto; min-height:0; overflow-y:auto; overflow-x:hidden; padding:10px 11px 24px}
.list.feedlist{padding:16px max(16px, env(safe-area-inset-left)) 40px}

/* ---- Feed view ---- */
.feedwrap{position:absolute; inset:0; display:flex; flex-direction:column}
.feed-head{
  flex:0 0 auto; padding:16px max(16px, env(safe-area-inset-left)) 13px;
  border-bottom:1px solid var(--hair); background:var(--panel);
  backdrop-filter:var(--glass-blur); -webkit-backdrop-filter:var(--glass-blur);
}
.feed-head .row{display:flex; align-items:center; justify-content:space-between; gap:14px; margin-bottom:13px; flex-wrap:wrap}
.feed-head h2{margin:0; font-size:15px; font-weight:700; letter-spacing:.01em}
.feed-scroll{flex:1 1 auto; min-height:0; overflow-y:auto}
.feed-inner{max-width:820px; margin:0 auto; padding:18px max(16px, env(safe-area-inset-left)) 60px}

/* ============================== Message card ============================== */
.card{
  position:relative; display:block; width:100%; text-align:left;
  border:1px solid var(--hair); border-radius:var(--r-md);
  background:var(--panel-2); padding:12px 13px 12px 15px; margin-bottom:9px;
  transition:background .2s var(--ease), border-color .2s var(--ease), transform .12s var(--ease), box-shadow .2s var(--ease);
  overflow:hidden;
}
.card::before{content:""; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--c, var(--disc-other))}
.card:hover{background:var(--card-hover); border-color:var(--hair-strong)}
.card:active{transform:scale(.995)}
.card.sel{background:var(--sel); border-color:color-mix(in srgb, var(--disc-politie) 45%, var(--hair-strong)); box-shadow:0 0 0 1px color-mix(in srgb, var(--disc-politie) 30%, transparent)}
.card .top{display:flex; align-items:center; gap:8px; margin-bottom:7px}

.badge{
  font-family:var(--mono); font-size:11px; font-weight:700; letter-spacing:.02em;
  padding:3px 7px; border-radius:7px; line-height:1; flex:0 0 auto;
  color:#fff; background:var(--pr-muted); box-shadow:inset 0 0 0 1px rgba(255,255,255,.12);
}
.badge.p1{background:linear-gradient(180deg, #ff5a5a, var(--pr1)); box-shadow:0 0 0 1px rgba(239,68,68,.5), 0 0 14px rgba(239,68,68,.45)}
.badge.p2{background:linear-gradient(180deg, #ffb43a, var(--pr2)); color:#241500}
.badge.p3{background:linear-gradient(180deg, #62c8ff, var(--pr3)); color:#04202e}
.badge.pm{background:var(--chip-on); color:var(--txt-2); box-shadow:inset 0 0 0 1px var(--hair)}

.disc-tag{font-size:10.5px; font-weight:700; letter-spacing:.09em; text-transform:uppercase; color:var(--c, var(--disc-other))}
.card .city{font-size:13px; font-weight:650; color:var(--txt); letter-spacing:.01em;
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap; min-width:0; flex:1 1 auto}
.card .city.nocity{color:var(--txt-3); font-weight:600}
.card .time{margin-left:auto; font-size:11.5px; color:var(--txt-3); font-variant-numeric:tabular-nums; white-space:nowrap; flex:0 0 auto}

.card .body{font-size:13px; line-height:1.5; color:var(--txt-2); word-break:break-word}
.feed-inner .card .body{font-size:14px; color:var(--txt)}
.card .meta{display:flex; align-items:center; gap:8px; margin-top:9px; flex-wrap:wrap}
.caps{font-family:var(--mono); font-size:10.5px; color:var(--txt-3); letter-spacing:.02em;
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.pin{font-size:10.5px; color:var(--txt-3); display:inline-flex; align-items:center; gap:4px}
.pin svg{width:11px; height:11px; opacity:.8}
.card.enter{animation:cardIn .5s var(--ease)}
@keyframes cardIn{from{opacity:0; transform:translateY(-8px) scale(.99)} to{opacity:1; transform:none}}
.card.flash::after{content:""; position:absolute; inset:0; border-radius:inherit; pointer-events:none;
  background:radial-gradient(120% 100% at 0% 50%, color-mix(in srgb, var(--c) 26%, transparent), transparent 60%);
  animation:flashfade 1.6s var(--ease) forwards}
@keyframes flashfade{from{opacity:1}to{opacity:0}}

/* ============================== Empty / loading ============================== */
.empty{position:absolute; inset:0; display:grid; place-items:center; padding:24px; text-align:center; pointer-events:none; z-index:2}
.empty.hide{display:none}
.empty-card{max-width:340px; display:flex; flex-direction:column; align-items:center; gap:14px}
.pulse-ring{width:56px; height:56px; border-radius:50%; position:relative; display:grid; place-items:center;
  background:var(--panel-2); border:1px solid var(--hair)}
.pulse-ring::before,.pulse-ring::after{content:""; position:absolute; inset:0; border-radius:50%;
  border:1px solid var(--disc-politie); opacity:0; animation:ring 2.4s var(--ease) infinite}
.pulse-ring::after{animation-delay:1.2s}
@keyframes ring{0%{transform:scale(.6);opacity:.7}100%{transform:scale(1.9);opacity:0}}
.pulse-ring svg{width:22px; height:22px; color:var(--txt-2)}
.empty h3{margin:0; font-size:15px; font-weight:700}
.empty p{margin:0; font-size:13px; color:var(--txt-3); line-height:1.55}
.list-empty{display:none; padding:40px 20px; text-align:center; color:var(--txt-3); font-size:13px; line-height:1.5}
.list-empty.show{display:block}

/* skeletons */
.skeleton{margin-bottom:9px; border:1px solid var(--hair); border-radius:var(--r-md); background:var(--panel-2);
  height:82px; position:relative; overflow:hidden}
.skeleton::after{content:""; position:absolute; inset:0;
  background:linear-gradient(90deg, transparent, var(--card-hover), transparent);
  transform:translateX(-100%); animation:shimmer 1.5s infinite}
@keyframes shimmer{100%{transform:translateX(100%)}}

/* ============================== Leaflet marker ============================== */
.mk{position:relative; width:0; height:0}
.mk .glyph{
  position:absolute; left:50%; top:50%; width:22px; height:22px; transform:translate(-50%,-50%);
  border-radius:50%; background:var(--c); border:2.5px solid rgba(9,11,15,.85);
  box-shadow:0 2px 8px rgba(0,0,0,.55), 0 0 0 1px color-mix(in srgb, var(--c) 60%, transparent);
  display:grid; place-items:center; transition:transform .18s var(--ease);
}
.mk .glyph svg{width:12px; height:12px; color:#04070b}
.mk.sel .glyph{width:28px; height:28px; box-shadow:0 4px 16px rgba(0,0,0,.6), 0 0 0 3px color-mix(in srgb, var(--c) 55%, transparent)}
.mk.new .pulse{position:absolute; left:50%; top:50%; width:22px; height:22px; transform:translate(-50%,-50%);
  border-radius:50%; background:var(--c); animation:mkpulse 1.6s var(--ease) 3}
@keyframes mkpulse{0%{transform:translate(-50%,-50%) scale(1);opacity:.6}100%{transform:translate(-50%,-50%) scale(3.6);opacity:0}}

/* cluster bubbles */
.marker-cluster{background:transparent!important}
.mcl{width:38px; height:38px; border-radius:50%; display:grid; place-items:center;
  font-family:var(--font); font-weight:700; font-size:13px; color:#fff;
  background:radial-gradient(circle at 32% 28%, rgba(255,255,255,.28), transparent 60%), var(--disc-politie);
  border:2px solid rgba(9,11,15,.6); box-shadow:0 3px 14px rgba(0,0,0,.5), 0 0 0 6px color-mix(in srgb, var(--disc-politie) 22%, transparent);
  font-variant-numeric:tabular-nums;}
.mcl.big{width:46px; height:46px; font-size:14px}

/* leaflet popup restyle */
.leaflet-popup-content-wrapper{background:var(--panel-solid); color:var(--txt); border-radius:var(--r-md);
  box-shadow:var(--sh-pop); border:1px solid var(--hair-strong); padding:0}
.leaflet-popup-content{margin:0; width:270px!important; line-height:inherit}
.leaflet-popup-tip{background:var(--panel-solid); border:1px solid var(--hair-strong)}
.leaflet-popup-close-button{color:var(--txt-3)!important; padding:9px 9px 0 0!important; font-size:18px!important}
.leaflet-popup-close-button:hover{color:var(--txt)!important}
.pop{padding:13px 14px 14px}
.pop .top{display:flex; align-items:center; gap:8px; margin-bottom:9px}
.pop .city{font-size:14px; font-weight:700}
.pop .body{font-size:13px; line-height:1.5; color:var(--txt-2); margin-bottom:9px}
.pop .caps{font-family:var(--mono); font-size:10.5px; color:var(--txt-3)}
.pop .foot{display:flex; justify-content:space-between; align-items:center; margin-top:10px; padding-top:9px; border-top:1px solid var(--hair)}
.pop .foot .t{font-size:11px; color:var(--txt-3); font-variant-numeric:tabular-nums}
.pop .foot .d{font-size:10.5px; font-weight:700; text-transform:uppercase; letter-spacing:.08em; color:var(--c)}

.leaflet-control-zoom{border:none!important; box-shadow:var(--sh-2)!important; margin:14px!important}
.leaflet-control-zoom a{background:var(--panel-solid)!important; color:var(--txt-2)!important;
  border:1px solid var(--hair)!important; width:34px!important; height:34px!important; line-height:32px!important;
  font-size:18px!important; border-radius:0}
.leaflet-control-zoom a:first-child{border-radius:10px 10px 0 0}
.leaflet-control-zoom a:last-child{border-radius:0 0 10px 10px; border-top:none!important}
.leaflet-control-zoom a:hover{background:var(--card-hover)!important; color:var(--txt)!important}
.leaflet-control-attribution{background:var(--panel)!important; color:var(--txt-3)!important;
  backdrop-filter:blur(10px); border-radius:8px 0 0 0!important; font-size:10px!important; padding:3px 7px!important}
.leaflet-control-attribution a{color:var(--txt-2)!important}
:root[data-theme="light"] .leaflet-tile{filter:none}

/* toast for new-off-screen */
.livepill{
  position:absolute; z-index:700; left:50%; top:14px; transform:translate(-50%,-16px);
  display:flex; align-items:center; gap:8px; padding:8px 14px; border-radius:999px;
  background:var(--panel); backdrop-filter:var(--glass-blur); border:1px solid var(--hair-strong);
  box-shadow:var(--sh-2); font-size:12px; font-weight:650; color:var(--txt);
  opacity:0; pointer-events:none; transition:.3s var(--ease);
}
.livepill.show{opacity:1; transform:translate(-50%,0); pointer-events:auto; cursor:pointer}
.livepill .swatch{width:8px; height:8px; border-radius:50%; background:var(--c); box-shadow:0 0 8px var(--c)}

/* ============================== Responsive ============================== */
.view{display:none}
.view.active{display:block}

@media (max-width:860px){
  .brand-sub{display:none}
  .stats .stat.today{display:none}
  .conn .txt{display:none}
  .conn{padding:0 0 0 0; width:38px; justify-content:center}
  .seg button span{display:none}
  .seg button{padding:8px 12px}

  /* bottom sheet */
  .side{
    position:absolute; left:0; right:0; bottom:0; top:auto; width:auto; height:52vh; height:52dvh;
    flex:none; border-left:none; border-top:1px solid var(--hair-strong);
    border-radius:20px 20px 0 0; box-shadow:0 -12px 40px rgba(0,0,0,.5);

}
@media (max-width:420px){

}
@media (prefers-reduced-motion:reduce){
  *{animation-duration:.001ms!important; transition-duration:.001ms!important}
}
</style>
</head>
<body>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js" crossorigin=""></script>
<script>
"use strict";
/* ============================================================ Config */
const DISCIPLINES = {
  ambulance:{label:"Ambulance", color:"var(--disc-ambulance)", raw:"#10b981"},
  brandweer:{label:"Brandweer", color:"var(--disc-brandweer)", raw:"#f97316"},
  politie:{label:"Politie", color:"var(--disc-politie)", raw:"#3b82f6"},
  knrm:{label:"KNRM", color:"var(--disc-knrm)", raw:"#22d3ee"},
  other:{label:"Overig", color:"var(--disc-other)", raw:"#94a3b8"},
};
const DISC_ORDER = ["ambulance","brandweer","politie","knrm","other"];
const MAX_MSG = 1000;
const NL_CENTER = [52.15, 5.3];

/* discipline glyph icons (small svg) */
const GLYPHS = {
  ambulance:'<path d="M12 6v12M6 12h12" stroke-width="3"/>',
  brandweer:'<path d="M12 3c2 3 4 4 4 7a4 4 0 0 1-8 0c0-1 .5-2 1-2 0 1 1 1.5 1.5 1 .5-1-.5-2 1.5-6Z" fill="currentColor" stroke="none"/>',
  politie:'<path d="M12 3l7 3v5c0 4-3 7-7 8-4-1-7-4-7-8V6l7-3Z" fill="currentColor" stroke="none"/>',
  knrm:'<path d="M12 3v10M12 13l6-3M12 13l-6-3M5 17c1.5 1.5 3 2 7 2s5.5-.5 7-2" stroke-width="2"/>',
  other:'<circle cx="12" cy="12" r="4" fill="currentColor" stroke="none"/>',
};

/* ============================================================ State */
const state = {
  byId:new Map(),          // id -> msg
  order:[],                // ids newest-first
  markers:new Map(),       // id -> leaflet marker
  filters:new Set(DISC_ORDER),
  selected:null,
  follow:true,
  view:"map",
  lastPan:0,
  didInitialFit:false,
};

/* ============================================================ Utils */
const $ = s => document.querySelector(s);
const esc = s => (s==null?"":String(s)).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
function relTime(ms){
  const d = Date.now()-ms; const s = Math.round(d/1000);
  if (s<0) return "nu";
  if (s<10) return "nu";
  if (s<60) return s+"s";
  const m = Math.floor(s/60); if (m<60) return m+"m";
  const h = Math.floor(m/60); if (h<24) return h+"u";
  const dd = Math.floor(h/24); return dd+"d";
}
function priClass(p){
  if(!p || p.level==null) return "pm";
  if(p.level<=1) return "p1"; if(p.level===2) return "p2"; if(p.level===3) return "p3"; return "pm";
}
function priLabel(p){
  if(p && p.raw) return p.raw;
  if(p && p.level!=null) return "P"+p.level;
  return "—";
}
function discColorVar(d){ return (DISCIPLINES[d]||DISCIPLINES.other).color; }

/* ============================================================ Map */
const map = L.map("map",{zoomControl:false, attributionControl:true, preferCanvas:false, worldCopyJump:true})
  .setView(NL_CENTER, 8);
L.control.zoom({position:"bottomright"}).addTo(map);
L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",{
  attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/attributions">CARTO</a>',
  subdomains:"abcd", maxZoom:19, detectRetina:true
}).addTo(map);

const cluster = L.markerClusterGroup({
  showCoverageOnHover:false, maxClusterRadius:50, spiderfyOnMaxZoom:true, chunkedLoading:true,
  iconCreateFunction(c){
    const n=c.getChildCount();
    const big = n>=25 ? " big":"";
    // dominant discipline color
    const tally={};
    c.getAllChildMarkers().forEach(m=>{const d=m.options._disc||"other"; tally[d]=(tally[d]||0)+1;});
    let best="politie", bv=-1; for(const k in tally){ if(tally[k]>bv){bv=tally[k];best=k;} }
    const col=(DISCIPLINES[best]||DISCIPLINES.other).raw;
    return L.divIcon({html:`<div class="mcl${big}" style="--disc-politie:${col};background:radial-gradient(circle at 32% 28%, rgba(255,255,255,.28), transparent 60%), ${col}">${n}</div>`,
      className:"", iconSize:L.point(40,40)});
  }
});
map.addLayer(cluster);
map.on("movestart", ()=>{ /* user moved: keep follow but reset pan throttle gently */ });

/* ============================================================ Marker */
function makeMarker(m){
  const col = DISCIPLINES[m.discipline] ? DISCIPLINES[m.discipline].raw : DISCIPLINES.other.raw;
  const icon = L.divIcon({
    className:"", iconSize:L.point(0,0),
    html:`<div class="mk" data-id="${esc(m.id)}" style="--c:${col}">
      <span class="pulse"></span>
      <span class="glyph"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">${GLYPHS[m.discipline]||GLYPHS.other}</svg></span>
    </div>`
  });
  const mk = L.marker([m.geo.lat, m.geo.lon],{icon, _disc:m.discipline, riseOnHover:true, keyboard:false});
  mk.bindPopup(popupHTML(m),{closeButton:true, autoPanPadding:[40,40], offset:[0,-6]});
  mk.on("click", ()=>select(m.id,{fromMap:true}));
  return mk;
}
function popupHTML(m){
  const dc = DISCIPLINES[m.discipline]||DISCIPLINES.other;
  return `<div class="pop" style="--c:${dc.raw}">
    <div class="top">
      <span class="badge ${priClass(m.priority)}">${esc(priLabel(m.priority))}</span>
      <span class="city">${m.city?esc(m.city):"Onbekend"}</span>
    </div>
    <div class="body">${esc(m.body||m.raw||"")}</div>
    ${m.capcodes&&m.capcodes.length?`<div class="caps">${esc(m.capcodes.join("  ·  "))}</div>`:""}
    <div class="foot"><span class="d">${esc(dc.label)}</span><span class="t" data-ts="${m.ts_ms}">${relTime(m.ts_ms)}</span></div>
  </div>`;
}

/* ============================================================ Ingest */
function normalize(m){
  if(!m || m.id==null) return null;
  const disc = DISCIPLINES[m.discipline] ? m.discipline : "other";
  let ts = Number(m.ts_ms);
  if(!isFinite(ts) || ts<=0){ ts = m.received_at ? Date.parse(m.received_at) : Date.now(); }
  const geo = (m.geo && isFinite(m.geo.lat) && isFinite(m.geo.lon)) ? {lat:+m.geo.lat, lon:+m.geo.lon} : null;
  return {
    id:String(m.id), ts_ms:ts, received_at:m.received_at||null,
    capcodes:Array.isArray(m.capcodes)?m.capcodes:[],
    body:m.body||"", raw:m.raw||"", discipline:disc,
    priority:m.priority||{raw:null,scheme:null,level:null},
    city:m.city||null, geo
  };
}
function insertSorted(id, ts){
  // newest-first; new live items are usually newest -> unshift fast path
  const ord = state.order;
  if(ord.length===0 || ts >= state.byId.get(ord[0]).ts_ms){ ord.unshift(id); return 0; }
  let lo=0, hi=ord.length;
  while(lo<hi){ const mid=(lo+hi)>>1; if(state.byId.get(ord[mid]).ts_ms > ts) lo=mid+1; else hi=mid; }
  ord.splice(lo,0,id); return lo;
}
function ingest(raw, live){
  const m = normalize(raw); if(!m) return null;
  if(state.byId.has(m.id)) return null; // dedupe
  state.byId.set(m.id, m);
  const idx = insertSorted(m.id, m.ts_ms);
  if(m.geo){ const mk = makeMarker(m); state.markers.set(m.id, mk); cluster.addLayer(mk); }
  // cap
  while(state.order.length>MAX_MSG){
    const drop = state.order.pop();
    const mk = state.markers.get(drop);
    if(mk){ cluster.removeLayer(mk); state.markers.delete(drop); }
    state.byId.delete(drop);
    const el1=document.getElementById("m_"+cssId(drop)); if(el1) el1.remove();
    const el2=document.getElementById("f_"+cssId(drop)); if(el2) el2.remove();
  }
  return {m, idx};
}
function cssId(id){ return id.replace(/[^a-zA-Z0-9_-]/g,"_"); }

/* ============================================================ Card DOM */
function cardEl(m, prefix){
  const dc = DISCIPLINES[m.discipline]||DISCIPLINES.other;
  const el = document.createElement("button");
  el.className="card"; el.id=prefix+"_"+cssId(m.id);
  el.style.setProperty("--c", dc.raw);
  el.dataset.id=m.id; el.dataset.disc=m.discipline;
  el.setAttribute("type","button");
  el.innerHTML =
    `<div class="top">
       <span class="badge ${priClass(m.priority)}">${esc(priLabel(m.priority))}</span>
       <span class="disc-tag">${esc(dc.label)}</span>
       <span class="city${m.city?"":" nocity"}">${m.city?esc(m.city):"Locatie onbekend"}</span>
       <span class="time rel" data-ts="${m.ts_ms}">${relTime(m.ts_ms)}</span>
     </div>
     <div class="body">${esc(m.body||m.raw||"—")}</div>
     <div class="meta">
       ${m.geo?'<span class="pin"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s-7-6.3-7-11a7 7 0 0 1 14 0c0 4.7-7 11-7 11Z"/><circle cx="12" cy="10" r="2.4"/></svg>op kaart</span>':""}
       ${m.capcodes&&m.capcodes.length?`<span class="caps">${esc(m.capcodes.slice(0,6).join(" · "))}${m.capcodes.length>6?" …":""}</span>`:""}
     </div>`;
  el.addEventListener("click", ()=>{
    if(state.view==="feed"){ // jump to map
      select(m.id,{focus:true, switchToMap:!!m.geo});
    } else {
      select(m.id,{focus:true});
    }
  });
  return el;
}
function passesFilter(m){ return state.filters.has(m.discipline); }

/* ============================================================ List render */
const mapList = $("#mapList"), feedList = $("#feedList");
let listsInit=false;
function clearSkeletons(){
  mapList.querySelectorAll(".skeleton").forEach(s=>s.remove());
  feedList.querySelectorAll(".skeleton").forEach(s=>s.remove());
}
function ensureListEmpty(container, msg){
  let e=container.querySelector(".list-empty");
  if(!e){ e=document.createElement("div"); e.className="list-empty"; container.appendChild(e); }
  e.textContent=msg;
  return e;
}
function rebuildLists(){
  clearSkeletons();
  const mf=document.createDocumentFragment(), ff=document.createDocumentFragment();
  let mcount=0, fcount=0;
  for(const id of state.order){
    const m=state.byId.get(id); if(!m) continue;
    if(!passesFilter(m)) continue;
    ff.appendChild(cardEl(m,"f")); fcount++;
    mf.appendChild(cardEl(m,"m")); mcount++;
  }
  mapList.innerHTML=""; mapList.appendChild(mf);
  feedList.innerHTML=""; feedList.appendChild(ff);
  const me=ensureListEmpty(mapList,"Geen meldingen in dit filter."); me.classList.toggle("show", mcount===0);
  const fe=ensureListEmpty(feedList,"Geen meldingen in dit filter."); fe.classList.toggle("show", fcount===0);
  $("#sideCount").textContent=mcount; $("#feedCount").textContent=fcount;
  if(state.selected) markSelectedDom();
}
function prependCard(m){
  clearSkeletons();
  if(!passesFilter(m)) { updateVisibleCounts(); return; }
  // remove any list-empty
  mapList.querySelectorAll(".list-empty.show").forEach(e=>e.classList.remove("show"));
  feedList.querySelectorAll(".list-empty.show").forEach(e=>e.classList.remove("show"));
  const fc=cardEl(m,"f"), mc=cardEl(m,"m");
  fc.classList.add("enter","flash"); mc.classList.add("enter","flash");
  // insert respecting sort: since ingest returns idx; but live newest -> prepend at top
  feedList.insertBefore(fc, feedList.firstChild);
  mapList.insertBefore(mc, mapList.firstChild);
  setTimeout(()=>{ fc.classList.remove("flash"); mc.classList.remove("flash"); }, 1700);
  updateVisibleCounts();
}
function updateVisibleCounts(){
  let m=0; for(const id of state.order){ const x=state.byId.get(id); if(x&&passesFilter(x)) m++; }
  $("#sideCount").textContent=m; $("#feedCount").textContent=m;
}

/* ============================================================ Selection */
function markSelectedDom(){
  document.querySelectorAll(".card.sel").forEach(c=>c.classList.remove("sel"));
  if(!state.selected) return;
  const cid=cssId(state.selected);
  ["m_","f_"].forEach(p=>{ const el=document.getElementById(p+cid); if(el) el.classList.add("sel"); });
  // marker highlight
  state.markers.forEach((mk,id)=>{
    const node=mk.getElement&&mk.getElement();
    const inner=node&&node.querySelector(".mk");
    if(inner) inner.classList.toggle("sel", id===state.selected);
  });
}
function scrollCardIntoView(){
  const cid=cssId(state.selected);
  const p = state.view==="feed" ? "f_" : "m_";
  const el=document.getElementById(p+cid);
  if(el) el.scrollIntoView({block:"nearest", behavior:"smooth"});
}
function select(id, opts={}){
  state.selected=id;
  const m=state.byId.get(id);
  if(opts.switchToMap){ setView("map"); }
  markSelectedDom();
  if(!opts.fromList) scrollCardIntoView();
  if(m && m.geo && (opts.focus||opts.switchToMap)){
    if(document.body.clientWidth<=860) closeSheet();
    const doFocus=()=>{
      map.setView([m.geo.lat,m.geo.lon], Math.max(map.getZoom(),13),{animate:true});
      const mk=state.markers.get(id);
      if(mk){ cluster.zoomToShowLayer(mk, ()=>{ mk.openPopup(); }); }
    };
    if(opts.switchToMap) setTimeout(()=>{ map.invalidateSize(); doFocus(); }, 60); else doFocus();
  }
}

/* ============================================================ Chips */
function buildChips(container, mirror){
  container.innerHTML="";
  DISC_ORDER.forEach(d=>{
    const dc=DISCIPLINES[d];
    const b=document.createElement("button");
    b.className="chip"; b.style.setProperty("--c",dc.raw);
    b.setAttribute("aria-pressed", state.filters.has(d)?"true":"false");
    b.dataset.disc=d;
    b.innerHTML=`<span class="swatch"></span>${dc.label} <span class="cnt" data-cnt="${d}">0</span>`;
    b.addEventListener("click",()=>toggleFilter(d));
    container.appendChild(b);
  });
}
function toggleFilter(d){
  if(state.filters.has(d)){ if(state.filters.size>1) state.filters.delete(d); else return; }
  else state.filters.add(d);
  syncChips(); rebuildLists(); applyMarkerFilter();
}
function syncChips(){
  document.querySelectorAll(".chip").forEach(c=>{
    c.setAttribute("aria-pressed", state.filters.has(c.dataset.disc)?"true":"false");
  });
}
function applyMarkerFilter(){
  cluster.clearLayers();
  const add=[];
  for(const id of state.order){
    const m=state.byId.get(id);
    if(m&&m.geo&&passesFilter(m)){ let mk=state.markers.get(id); if(mk) add.push(mk); }
  }
  if(add.length) cluster.addLayers(add);
}
function updateChipCounts(){
  const t={}; DISC_ORDER.forEach(d=>t[d]=0);
  for(const id of state.order){ const m=state.byId.get(id); if(m) t[m.discipline]=(t[m.discipline]||0)+1; }
  document.querySelectorAll("[data-cnt]").forEach(el=>{ el.textContent=t[el.dataset.cnt]||0; });
}

/* ============================================================ Counters */
function updateCounters(){
  const now=Date.now(), hourAgo=now-3600e3;
  const midnight=new Date(); midnight.setHours(0,0,0,0); const mid=midnight.getTime();
  let today=0, hour=0;
  for(const id of state.order){ const m=state.byId.get(id); if(!m) continue;
    if(m.ts_ms>=mid) today++; if(m.ts_ms>=hourAgo) hour++; }
  $("#stToday").textContent=today; $("#stHour").textContent=hour;
}

/* ============================================================ Live pan / flash */
function onNewLive(m){
  prependCard(m);
  updateChipCounts(); updateCounters();
  if(m.geo){
    // pulse marker
    const mk=state.markers.get(m.id);
    if(mk){ const el=mk.getElement&&mk.getElement(); const inner=el&&el.querySelector(".mk");
      if(inner){ inner.classList.add("new"); setTimeout(()=>inner.classList.remove("new"),5000); } }
    if(state.follow && state.view==="map"){
      const now=Date.now();
      if(now-state.lastPan>3500){
        state.lastPan=now;
        map.panTo([m.geo.lat,m.geo.lon],{animate:true, duration:.9, easeLinearity:.25});
      } else {
        showLivePill(m);
      }
    } else if(state.view==="map" && !state.follow){
      showLivePill(m);
    }
  }
  hideEmpty();
}
let pillTimer=null;
function showLivePill(m){
  const p=$("#livepill"); const dc=DISCIPLINES[m.discipline]||DISCIPLINES.other;
  p.style.setProperty("--c",dc.raw);
  $("#livepillTxt").textContent=(m.city?m.city:"Nieuwe melding")+" · "+dc.label;
  p.classList.add("show");
  p.onclick=()=>{ if(m.geo){ map.setView([m.geo.lat,m.geo.lon],13,{animate:true}); select(m.id,{focus:true}); } p.classList.remove("show"); };
  clearTimeout(pillTimer); pillTimer=setTimeout(()=>p.classList.remove("show"),4200);
}

/* ============================================================ Empty state */
let hasData=false;
function hideEmpty(){ if(!hasData){ hasData=true; $("#empty").classList.add("hide"); } }

/* ============================================================ View toggle */
function setView(v){
  if(state.view===v) return;
  state.view=v;
  const map_=v==="map";
  $("#viewMap").classList.toggle("active",map_);
  $("#viewFeed").classList.toggle("active",!map_);
  $("#tabMap").setAttribute("aria-selected",map_?"true":"false");
  $("#tabFeed").setAttribute("aria-selected",!map_?"true":"false");
  $("#empty").style.display = (!hasData && map_) ? "" : (map_?"":"none");
  if(map_){ setTimeout(()=>map.invalidateSize(),40); }
}
$("#tabMap").addEventListener("click",()=>setView("map"));
$("#tabFeed").addEventListener("click",()=>setView("feed"));

/* ============================================================ Theme */
const THEME_KEY="p2000-theme";
function setTheme(t){ document.documentElement.setAttribute("data-theme",t);
  try{localStorage.setItem(THEME_KEY,t);}catch(e){}
  document.querySelector('meta[name=theme-color]').setAttribute("content", t==="light"?"#eef1f6":"#0a0c10"); }
(function(){ let t; try{t=localStorage.getItem(THEME_KEY);}catch(e){}
  if(!t) t = window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches ? "light":"dark";
  setTheme(t); })();
$("#themeBtn").addEventListener("click",()=>{
  setTheme(document.documentElement.getAttribute("data-theme")==="light"?"dark":"light");
});

/* follow toggle */
$("#followBtn").addEventListener("click",()=>{
  state.follow=!state.follow;
  $("#followBtn").classList.toggle("on",state.follow);
});

/* ============================================================ Bottom sheet (mobile) */
const side=$("#side"), sheetHead=$("#sheetHead");
function openSheet(){ side.classList.add("open"); }
function closeSheet(){ side.classList.remove("open"); }
(function sheetDrag(){
  let sy=0, open=false, dragging=false, moved=0;
  const onDown=e=>{ if(window.innerWidth>860) return; dragging=true; moved=0;
    sy=(e.touches?e.touches[0].clientY:e.clientY); open=side.classList.contains("open");
    side.style.transition="none"; };
  const onMove=e=>{ if(!dragging) return; const y=(e.touches?e.touches[0].clientY:e.clientY);
    let dy=y-sy; moved=dy;
    const base=open?0:(side.getBoundingClientRect().height-116);
    let t=Math.max(0, base+dy); side.style.transform=`translateY(${t}px)`; };
  const onUp=()=>{ if(!dragging) return; dragging=false; side.style.transition=""; side.style.transform="";
    if(Math.abs(moved)>40){ if(moved<0) openSheet(); else closeSheet(); }
    else { if(open) openSheet(); else closeSheet(); } };
  sheetHead.addEventListener("touchstart",onDown,{passive:true});
  sheetHead.addEventListener("touchmove",onMove,{passive:true});
  sheetHead.addEventListener("touchend",onUp);
  sheetHead.addEventListener("click",e=>{ if(window.innerWidth>860) return;
    if(Math.abs(moved)<6){ side.classList.toggle("open"); } });
})();

/* ============================================================ Tick relative times */
setInterval(()=>{
  const now=Date.now();
  document.querySelectorAll(".rel[data-ts], .t[data-ts]").forEach(el=>{
    el.textContent=relTime(+el.dataset.ts);
  });
  updateCounters();
}, 15000);

/* ============================================================ Data load */
async function loadInitial(){
  try{
    const r=await fetch("/api/messages?limit=200",{headers:{Accept:"application/json"}});
    if(!r.ok) throw new Error("HTTP "+r.status);
    const arr=await r.json();
    if(Array.isArray(arr)){
      // API is newest-first; ingest oldest-first so order stays consistent & markers batch
      const added=[];
      for(let i=arr.length-1;i>=0;i--){ const res=ingest(arr[i],false); if(res) added.push(res.m); }
      buildChips($("#chipsMap")); buildChips($("#chipsFeed"));
      rebuildLists(); updateChipCounts(); updateCounters();
      if(state.order.length){ hideEmpty();
        // initial fit to markers
        const pts=[]; state.markers.forEach(mk=>pts.push(mk.getLatLng()));
        if(pts.length){ try{ map.fitBounds(L.latLngBounds(pts).pad(.15),{maxZoom:11, animate:false}); }catch(e){} }
      }
    }
  }catch(e){ console.warn("initial load failed",e);
    buildChips($("#chipsMap")); buildChips($("#chipsFeed"));
  }
}

/* ============================================================ SSE */
let es=null, esRetry=0, reconnTimer=null;
function setConn(s){
  const c=$("#conn"); c.classList.remove("live","reconnecting","down");
  c.classList.add(s);
  $("#connTxt").textContent = s==="live"?"Live": s==="reconnecting"?"Verbinden…":"Offline";
}
function connectSSE(){
  setConn(esRetry?"reconnecting":"reconnecting");
  try{ es=new EventSource("/events"); }catch(e){ scheduleReconnect(); return; }
  es.addEventListener("open",()=>{ esRetry=0; setConn("live"); });
  const handle=ev=>{
    let data; try{ data=JSON.parse(ev.data); }catch(e){ return; }
    const res=ingest(data,true);
    if(res){ onNewLive(res.m); }
  };
  es.addEventListener("message",handle);
  es.onerror=()=>{ setConn("reconnecting"); if(es.readyState===2){ try{es.close();}catch(e){} scheduleReconnect(); } };
}
function scheduleReconnect(){
  clearTimeout(reconnTimer);
  esRetry++;
  const delay=Math.min(1000*Math.pow(1.7,Math.min(esRetry,6)), 15000);
  setConn(esRetry>3?"down":"reconnecting");
  reconnTimer=setTimeout(connectSSE, delay);
}
document.addEventListener("visibilitychange",()=>{
  if(!document.hidden && es && es.readyState===2){ esRetry=0; connectSSE(); }
});

/* ============================================================ Boot */
buildChips($("#chipsMap")); buildChips($("#chipsFeed"));
loadInitial().then(connectSSE);
setTimeout(()=>map.invalidateSize(),120);
window.addEventListener("resize",()=>{ if(state.view==="map") map.invalidateSize(); });
</script>
